<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K-pop Universe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse at 50% 38%,
      #12112a 0%,
      #0d0c20 30%,
      #09091a 60%,
      #060612 100%
    );
    overflow:hidden;transition:background 0.9s ease;
  }

  canvas{display:block;}
  #loading{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#8899ff;font-family:'Apple SD Gothic Neo',sans-serif;
    font-size:13px;letter-spacing:0.12em;opacity:0.85;
  }
  /* ── Tab bar ────────────────────────────────────── */
  #tabbar{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;align-items:center;justify-content:space-around;gap:0;
    background:rgba(14,18,36,0.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:0.5px solid rgba(255,255,255,0.07);
    border-radius:0;padding:6px 0 8px;z-index:40;
  }
  .tab-btn{
    flex:1;background:none;border:none;cursor:pointer;
    color:rgba(190,205,240,0.55);
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    font-size:14px;padding:8px 4px;border-radius:10px;
    transition:background .15s,color .15s;line-height:1;text-align:center;
  }
  .tab-btn:hover{background:rgba(255,255,255,0.07);color:rgba(210,225,255,0.85);}
  .tab-btn.active{background:rgba(255,255,255,0.09);color:rgba(225,238,255,0.95);}
  #tab-lang{font-size:10px;font-weight:700;letter-spacing:.1em;}
  .tab-sep{display:none;}
  /* ── Tabbar search mode (mobile) ────────────────── */
  #tabbar{transition:left .22s cubic-bezier(0.4,0,0.2,1),right .22s cubic-bezier(0.4,0,0.2,1),bottom .22s cubic-bezier(0.4,0,0.2,1),border-radius .22s,border-top-color .22s,transform .28s cubic-bezier(0.4,0,0.2,1),opacity .28s;}
  #tabbar.tab-hidden{transform:translateY(110%);opacity:0;pointer-events:none;}
  #tabbar.search-mode{bottom:10px;left:16px;right:16px;border-radius:16px;border-top-color:transparent;padding:6px 10px;justify-content:flex-start;box-shadow:0 4px 24px rgba(0,0,0,0.45);}
  #tabbar.search-mode .tab-btn,#tabbar.search-mode .tab-sep{display:none!important;}
  #tab-sb-icon{display:none;flex-shrink:0;color:rgba(190,205,240,0.65);align-items:center;padding-right:8px;}
  #tab-sb-input{display:none;flex:1;background:none;border:none;color:#c8d8f0;
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;font-size:16px;
    outline:none;padding:4px 0;min-width:0;letter-spacing:.03em;
    -webkit-text-size-adjust:none;}
  #tab-sb-input::placeholder{color:rgba(140,160,200,0.32);}
  #tab-sb-clear{display:none;flex-shrink:0;background:none;border:none;
    color:rgba(190,205,240,0.55);font-size:16px;cursor:pointer;padding:4px 6px;line-height:1;align-items:center;}
  #tabbar.search-mode #tab-sb-icon{display:flex;}
  #tabbar.search-mode #tab-sb-input{display:block;}
  #tabbar.search-mode #tab-sb-clear{display:flex;}
  /* ── Mobile search results ───────────────────────── */
  #mob-sr{
    position:fixed;left:12px;right:12px;
    width:calc(100vw - 24px);max-width:calc(100vw - 24px);
    bottom:var(--sheet-bottom,73px);
    background:rgba(18,22,40,0.96);border-radius:14px;
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    box-shadow:0 -2px 28px rgba(0,0,0,0.50);z-index:42;
    max-height:260px;overflow-y:auto;overflow-x:hidden;display:none;
    box-sizing:border-box;
  }
  #mob-sr.open{display:block;}
  /* ── Desktop header ──────────────────────────────── */
  #desktop-header{
    position:fixed;top:16px;left:0;right:0;
    display:flex;align-items:center;justify-content:flex-end;
    padding:0 16px;z-index:40;pointer-events:none;
  }
  @media(max-width:768px){#desktop-header{display:none;}}
  #dh-right{pointer-events:all;}
  #dh-right{
    background:rgba(18,22,40,0.82);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    box-shadow:0 4px 24px rgba(0,0,0,0.45);
    border-radius:22px;padding:4px 6px;display:flex;align-items:center;gap:2px;
  }
  .dh-btn{
    background:none;border:none;cursor:pointer;
    color:rgba(190,205,240,0.55);
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    font-size:15px;padding:6px 12px;border-radius:16px;
    transition:background .15s,color .15s;line-height:1;
  }
  .dh-btn:hover{background:rgba(255,255,255,0.08);color:rgba(210,225,255,0.85);}
  .dh-btn.active{background:rgba(255,255,255,0.10);color:rgba(225,238,255,0.95);}
  #dh-lang-btn{font-size:10px;font-weight:700;letter-spacing:.1em;padding:6px 11px;}
  /* ── Settings panel ─────────────────────────────── */
  #settings-panel{
    position:fixed;bottom:78px;right:16px;width:252px;
    background:rgba(18,22,40,0.94);
    backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
    border-radius:16px;padding:14px 16px 16px;z-index:40;display:none;
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  }
  #settings-panel.open{display:block;}
  .sp-hd{font-size:9.5px;font-weight:700;letter-spacing:.2em;color:rgba(130,150,205,0.5);
    text-transform:uppercase;margin-bottom:11px;}
  .sp-row{display:flex;align-items:center;justify-content:space-between;
    padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,0.055);}
  .sp-row:last-child{border-bottom:none;padding-top:9px;}
  .sp-lbl{font-size:10.5px;color:#7090b8;letter-spacing:.02em;}
  .sp-tog{
    background:rgba(255,255,255,0.07);border:none;
    color:rgba(150,168,210,0.65);font-size:9px;letter-spacing:.1em;font-weight:700;
    padding:3px 10px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .sp-tog.on{background:rgba(160,180,255,0.18);color:rgba(200,215,255,0.95);}
  .sp-sec{padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.055);}
  .sp-sec-lbl{font-size:10px;color:#7090b8;margin-bottom:5px;}
  .sp-dual{position:relative;height:18px;margin-top:6px;}
  .sp-dual::before{content:'';position:absolute;top:50%;left:0;right:0;height:1.5px;
    background:rgba(255,255,255,0.13);transform:translateY(-50%);border-radius:1px;pointer-events:none;}
  .sp-dual input[type=range]{
    position:absolute;width:100%;height:100%;left:0;top:0;margin:0;padding:0;
    pointer-events:none;-webkit-appearance:none;appearance:none;background:transparent;
  }
  .sp-dual input[type=range]::-webkit-slider-runnable-track{background:transparent;}
  .sp-dual input[type=range]::-moz-range-track{background:transparent;height:0;}
  .sp-dual input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;pointer-events:all;cursor:pointer;
    width:11px;height:11px;border-radius:50%;background:#8899dd;border:none;
  }
  .sp-dual input[type=range]::-moz-range-thumb{
    pointer-events:all;cursor:pointer;
    width:11px;height:11px;border-radius:50%;background:#8899dd;border:none;
  }
  .sp-rng-vals{display:flex;justify-content:space-between;font-size:8.5px;color:#4a6278;margin-top:2px;}
  .sp-types{display:flex;gap:4px;margin-top:5px;}
  .sp-type{
    flex:1;padding:4px 0;font-size:9.5px;letter-spacing:.03em;text-align:center;
    background:rgba(255,255,255,0.05);border:none;
    color:rgba(120,140,188,0.62);border-radius:8px;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .sp-type.active{background:rgba(140,162,255,0.18);color:rgba(195,210,255,0.95);}
  .sp-reset{
    background:none;border:none;cursor:pointer;padding:1px 0;
    font-size:9px;letter-spacing:.10em;font-family:inherit;
    color:rgba(120,138,182,0.30);transition:color .15s;
  }
  .sp-reset:hover{color:rgba(170,188,232,0.68);}
  /* ── Toggle switch ───────────────────────────────── */
  .sw{display:inline-flex;align-items:center;cursor:pointer;flex-shrink:0;}
  .sw input{display:none;}
  .sw-track{
    width:28px;height:16px;border-radius:8px;position:relative;
    background:rgba(255,255,255,0.09);border:none;
    transition:background .22s;
  }
  .sw input:checked+.sw-track{background:rgba(130,155,255,0.30);}
  .sw-thumb{
    position:absolute;top:2.5px;left:2.5px;
    width:9px;height:9px;border-radius:50%;
    background:rgba(148,165,218,0.48);
    transition:transform .22s,background .22s;pointer-events:none;
  }
  .sw input:checked+.sw-track .sw-thumb{
    transform:translateX(12px);background:rgba(185,202,255,0.88);
  }
  .group-label{
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    font-size:12px;font-weight:500;letter-spacing:0.1em;
    pointer-events:none;user-select:none;white-space:nowrap;
    text-shadow:0 0 18px currentColor,0 0 7px currentColor,0 1px 4px rgba(0,0,0,0.80);
    transition:opacity 0.35s ease;
  }
  /* ── Cards ───────────────────────────────────── */
  #tt,#gc{
    background:rgba(16,20,36,0.68);
    backdrop-filter:blur(36px) saturate(180%);
    -webkit-backdrop-filter:blur(36px) saturate(180%);
    border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,0.50);
  }
  #tt{
    position:fixed;display:none;max-width:210px;
    padding:13px 15px 12px 20px;font-size:14px;line-height:1.55;
    color:#ccd8ee;z-index:30;pointer-events:all;
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  }
  #ttx{position:absolute;top:9px;right:11px;font-size:15px;color:rgba(150,170,215,0.65);cursor:pointer;line-height:1;}
  #tt-bar{height:2px;width:100%;margin-bottom:12px;}
  .tn{font-size:16px;font-weight:700;color:#d8e4f6;margin-bottom:3px;padding-right:18px;padding-left:4px;letter-spacing:-.02em;}
  #tg-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:1px;padding-right:4px;}
  .tg{font-size:14px;color:#aec8e8;padding-left:4px;letter-spacing:.05em;font-weight:500;text-transform:uppercase;cursor:pointer;transition:color .12s;width:fit-content;}
  .tg:hover{color:#d0e8ff;}
  .tco{font-size:14px;color:#88aac8;margin-bottom:6px;}
  .tm{display:none;}
  #tv-big-wrap{cursor:pointer;border-radius:8px;overflow:hidden;background:rgba(255,255,255,0.04);}
  #tv-big-wrap:hover #tv-big{opacity:.84;}
  #tv-big{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:opacity .13s;}
  #tv-big-title{font-size:13px;color:#a8bcd8;line-height:1.3;padding:4px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  #tv-small-row{display:flex;gap:5px;margin-top:5px;}
  .tv-sm{flex:1;cursor:pointer;border-radius:6px;overflow:hidden;background:rgba(255,255,255,0.04);transition:opacity .13s;}
  .tv-sm:hover{opacity:.82;}
  .tv-sm img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
  .tv-sm-title{font-size:13px;color:#a8bcd8;line-height:1.3;padding:4px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  @media(min-width:769px){
    #tv-big-title,.tv-sm-title{text-overflow:unset;}
    .tv-title-inner{display:inline-block;white-space:nowrap;vertical-align:top;}
    #tv-big-title:not(.is-marquee),.tv-sm-title:not(.is-marquee){-webkit-mask-image:linear-gradient(to right,#000 calc(100% - 14px),transparent 100%);mask-image:linear-gradient(to right,#000 calc(100% - 14px),transparent 100%);}
    .marquee-run{animation:title-marquee 5s .4s linear infinite alternate;}
    @keyframes title-marquee{0%,15%{transform:translateX(0);}85%,100%{transform:translateX(var(--mx,0px));}}
  }
  .tv-empty{font-size:11px;color:#5878a0;}
  /* 쇼츠 썸네일 (9:16) */
  #tv-big-wrap.is-shorts #tv-big{aspect-ratio:9/16;width:40%;margin:0 auto;}
  #tv-small-row .tv-sm.is-shorts,.tv-more-wrap .tv-sm.is-shorts{flex:0 0 52px;width:52px;}
  .tv-sm.is-shorts img{aspect-ratio:9/16;}
  /* 웹 2열 그리드 (가로 영상 먼저, 쇼츠 짝수로 뒤에) */
  #tv-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;}
  /* 더보기 버튼 */
  .tv-more-btn{width:100%;margin-top:5px;padding:5px 8px;border:none;border-radius:8px;background:rgba(255,255,255,0.08);color:rgba(160,180,225,0.80);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .13s,color .13s;}
  .tv-more-btn:hover{background:rgba(255,255,255,0.13);color:rgba(205,220,255,0.95);}
  .tv-more-wrap{flex-wrap:wrap;gap:5px;margin-top:5px;display:none;}
  .tv-more-wrap.open{display:flex;}
  .tv-more-wrap .tv-sm{flex:0 0 calc(50% - 2.5px);}
  /* 모바일 쇼츠 2열 그리드 */
  .mob-shorts-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px;}
  .mob-shorts-grid .tv-sm{width:100%;flex:none;}
  .mob-shorts-grid .tv-sm.is-shorts{flex:none;width:100%;}
  .mob-shorts-grid .tv-sm img{width:100%;aspect-ratio:9/16;object-fit:cover;}
  .mob-shorts-grid.tv-more-wrap{display:none;}
  .mob-shorts-grid.tv-more-wrap.open{display:grid;}
  /* ── Mobile bottom sheet ─────────────────────────── */
  #mob-sheet{
    display:none;position:fixed;left:0;right:0;width:100%;
    bottom:var(--sheet-bottom,73px);
    max-height:55vh;
    border-radius:20px 20px 0 0;
    background:rgba(16,20,36,0.96);
    backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
    border:0.5px solid rgba(255,255,255,0.10);
    box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 -8px 32px rgba(0,0,0,0.55);
    z-index:35;pointer-events:all;overflow:hidden;
    box-sizing:border-box;
    transform:translateY(calc(100% + var(--sheet-bottom,73px)));
    transition:transform .32s cubic-bezier(0.32,0.72,0,1),max-height .32s cubic-bezier(0.32,0.72,0,1),min-height .32s cubic-bezier(0.32,0.72,0,1),border-radius .32s;
  }
  #mob-sheet.bs-open{transform:translateY(0);}
  #mob-sheet.bs-full{min-height:calc(var(--mob-vh,100vh) - var(--sheet-bottom,73px));max-height:calc(var(--mob-vh,100vh) - var(--sheet-bottom,73px));border-radius:0;}
  #mob-sheet.bs-full #mob-sheet-inner{max-height:calc(var(--mob-vh,100vh) - var(--sheet-bottom,73px) - 24px);}
  #yt-lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:55;align-items:center;justify-content:center;}
  #yt-lightbox.open{display:flex;}
  #yt-lb-wrap{position:relative;width:min(88vw,900px);}
  #yt-lb-iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:8px;display:block;}
  #yt-lb-iframe.is-shorts{aspect-ratio:9/16;width:min(42vw,320px);margin:0 auto;}
  #yt-lb-close{position:absolute;top:-30px;right:0;background:none;border:none;color:#fff;font-size:20px;cursor:pointer;padding:4px 6px;opacity:.65;line-height:1;}
  #yt-lb-close:hover{opacity:1;}
  #mob-sheet-handle{width:36px;height:4px;background:rgba(255,255,255,0.14);border-radius:2px;margin:10px auto 6px;display:block;}
  #mob-sheet-inner{overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;max-height:calc(55vh - 24px);overscroll-behavior:contain;width:100%;box-sizing:border-box;}
  #mob-sheet-inner>#tt,#mob-sheet-inner>#gc{
    position:static!important;display:block!important;
    max-width:100%!important;width:100%!important;
    left:auto!important;top:auto!important;right:auto!important;bottom:auto!important;
    border-radius:0!important;box-shadow:none!important;
    border:none!important;background:transparent!important;
    backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
    transform:none!important;transition:none!important;
    box-sizing:border-box!important;overflow-x:hidden!important;
  }
  @media(max-width:768px){
    #tt,#gc{display:none;} /* 카드는 bottom sheet 안에서만 표시 */
    #settings-panel{
      right:0;left:0;bottom:var(--sheet-bottom,73px);
      width:100%;max-width:100%;border-radius:20px 20px 0 0;
      max-height:65vh;overflow-y:auto;
    }
  }
  /* ── Side panel (desktop) ──────────────────────────── */
  #side-panel{
    position:fixed;right:0;top:64px;bottom:0;width:320px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    z-index:35;pointer-events:none;
    transform:translateX(100%);
    visibility:hidden;
    transition:transform 0.26s cubic-bezier(0.32,0,0.15,1),visibility 0s 0.26s;
    background:rgba(16,20,36,0.84);
  }
  #side-panel.open{
    transform:translateX(0);pointer-events:all;
    visibility:visible;
    transition:transform 0.26s cubic-bezier(0.32,0,0.15,1),visibility 0s 0s;
    backdrop-filter:blur(40px) saturate(190%);-webkit-backdrop-filter:blur(40px) saturate(190%);
    box-shadow:-8px 0 40px rgba(0,0,0,0.55);
  }
  #side-panel>#tt,#side-panel>#gc{
    position:relative!important;display:block!important;max-width:100%!important;
    width:100%!important;border-radius:0!important;border:none!important;
    box-shadow:none!important;background:none!important;
    backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
    left:auto!important;top:auto!important;right:auto!important;bottom:auto!important;
  }
  #side-panel>#gc{padding-top:44px;}
  #side-panel>#tt{padding-top:40px;}
  /* SNS links */
  #gc-sns-list{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
  .gc-sns-link{
    padding:2px 7px;border-radius:20px;font-size:9.5px;font-weight:600;
    background:rgba(160,200,255,0.08);border:0.5px solid rgba(160,200,255,0.22);
    color:rgba(180,210,255,0.80);text-decoration:none;letter-spacing:.04em;
    transition:background .15s,color .15s;
  }
  .gc-sns-link:hover{background:rgba(160,200,255,0.18);color:rgba(200,225,255,0.98);}
  @media(max-width:768px){#side-panel{display:none;}}
  /* ── Member panel (그룹 카드 왼쪽 확장) ───────────── */
  #member-panel{
    position:fixed;right:320px;top:64px;bottom:0;width:320px;
    overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    z-index:34;pointer-events:none;
    transform:translateX(100%);
    visibility:hidden;
    transition:transform 0.26s cubic-bezier(0.32,0,0.15,1),visibility 0s 0.26s;
    background:rgba(16,20,36,0.84);
  }
  #member-panel.open{
    transform:translateX(0);pointer-events:all;
    visibility:visible;
    transition:transform 0.26s cubic-bezier(0.32,0,0.15,1),visibility 0s 0s;
    backdrop-filter:blur(40px) saturate(190%);-webkit-backdrop-filter:blur(40px) saturate(190%);
    box-shadow:-8px 0 40px rgba(0,0,0,0.45);
  }
  #member-panel>#tt{
    position:relative!important;display:block!important;max-width:100%!important;
    width:100%!important;border-radius:0!important;border:none!important;
    box-shadow:none!important;background:none!important;
    backdrop-filter:none!important;-webkit-backdrop-filter:none!important;
    left:auto!important;top:auto!important;right:auto!important;bottom:auto!important;
    padding-top:44px;
  }
  #member-panel>#tt #ttx{display:none!important;}
  /* 접기 탭: member-panel 왼쪽 중간 */
  #tt-collapse{
    position:fixed;right:640px;top:50%;transform:translateY(-50%);
    width:26px;height:52px;border:none;border-radius:8px 0 0 8px;
    background:rgba(20,24,44,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    color:rgba(160,185,230,0.80);font-size:18px;line-height:1;
    cursor:pointer;padding:0;z-index:34;
    opacity:0;pointer-events:none;
    transition:opacity 0.22s,background 0.15s,color 0.15s;
    display:flex;align-items:center;justify-content:center;
  }
  #member-panel.open~#tt-collapse{opacity:1;pointer-events:all;}
  #tt-collapse:hover{background:rgba(40,50,80,0.96);color:rgba(200,220,255,0.95);}
  @media(max-width:768px){#member-panel{display:none;}#tt-collapse{display:none;}}
  /* ── Member card nav ──────────────────────────────── */
  #tt-nav{
    display:flex;align-items:center;justify-content:space-between;
    margin-top:2px;margin-bottom:8px;
  }

<script>
const W=window.innerWidth,H=window.innerHeight;

// ── Scene ─────────────────────────────────────────
const scene=new THREE.Scene();
scene.background=null;

const camera=new THREE.PerspectiveCamera(60,W/H,0.1,1000);
camera.position.set(0,-4,120);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
document.body.appendChild(renderer.domElement);

const labelRenderer=new THREE.CSS2DRenderer();
labelRenderer.setSize(W,H);
labelRenderer.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none;z-index:2;';
document.body.appendChild(labelRenderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.06;
controls.minDistance=5;
controls.maxDistance=300;
controls.autoRotate=true;
controls.autoRotateSpeed=0.25;

// ── Stars ─────────────────────────────────────────
function makeStarField(count,size,opacity){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    pos[i*3  ]=(Math.random()-.5)*400;
    pos[i*3+1]=(Math.random()-.5)*400;
    pos[i*3+2]=(Math.random()-.5)*400;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({
    color:0xffffff,size,sizeAttenuation:true,transparent:true,opacity
  }));
}
const starGroup=new THREE.Group();
starGroup.add(makeStarField(420,0.2,0.6));   // 잔별
starGroup.add(makeStarField(70,0.55,0.85));  // 중간별
starGroup.add(makeStarField(15,1.1,1.0));    // 밝은별
scene.add(starGroup);
// 기존 코드와 호환되도록 alias
const starPoints=starGroup;

// ── Lights ────────────────────────────────────────
const ambLight=new THREE.AmbientLight(0x8877aa,0.3);
scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0xc8b8a0,0.4);
dirLight.position.set(3,2,-1);
scene.add(dirLight);

// ── Glow texture ──────────────────────────────────
function makeGlowTex(){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const cx=c.getContext('2d');
  const glow=cx.createRadialGradient(32,32,0,32,32,32);
  glow.addColorStop(0,    'rgba(255,255,255,0.65)');
  glow.addColorStop(0.15, 'rgba(255,255,255,0.38)');
  glow.addColorStop(0.35, 'rgba(255,255,255,0.15)');
  glow.addColorStop(0.55, 'rgba(255,255,255,0.05)');
  glow.addColorStop(0.78, 'rgba(255,255,255,0.01)');
  glow.addColorStop(1,    'rgba(255,255,255,0)');
  cx.fillStyle=glow;
  cx.fillRect(0,0,64,64);
  const core=cx.createRadialGradient(32,32,0,32,32,3);
  core.addColorStop(0,   'rgba(255,255,255,1.0)');
  core.addColorStop(0.55,'rgba(255,255,255,0.7)');
  core.addColorStop(1,   'rgba(255,255,255,0)');
  cx.fillStyle=core;
  cx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
const glowTex=makeGlowTex();

// Mix rgb with grayscale 30:70
function duneColor(r,g,b){
  const gr=r*0.299+g*0.587+b*0.114;
  return new THREE.Color(
    Math.min(1,(r*0.70+gr*0.30)/255),
    Math.min(1,(g*0.70+gr*0.30)/255),
    Math.min(1,(b*0.70+gr*0.30)/255 + 0.05)  // 쿨 틴트
  );
}

const groupLabels=[];
let ARTISTS=[],GROUPS={};
const bubbleMeshes=[],regularArtists=[],sparkleArtists=[];
let regularPts=null,sparklePts=null;

function easeInOut(t){return -(Math.cos(Math.PI*t)-1)/2;}

// ── Agency direction ──────────────────────────────
function agencyDir(co){
  const c=(co||'').toUpperCase();
  if(c.includes('SM'))  return new THREE.Vector3(1,0,0);
  if(c.includes('JYP')) return new THREE.Vector3(-1,0,0);
  if(c.includes('HYBE'))return new THREE.Vector3(0,-1,0);
  return new THREE.Vector3(0,0,1);
}

function coneSpread(co){
  const c=(co||'').toUpperCase();
  if(c.includes('SM')||c.includes('JYP'))return Math.PI*0.4;
  if(c.includes('HYBE'))return Math.PI*0.42;
  return Math.PI*0.52;
}

function randomInCone(dir,halfAngle){
  const cosA=Math.cos(halfAngle);
  const cosT=cosA+(1-cosA)*Math.random();
  const sinT=Math.sqrt(1-cosT*cosT);
  const phi=Math.random()*Math.PI*2;
  const v=new THREE.Vector3(sinT*Math.cos(phi),sinT*Math.sin(phi),cosT);
  const q=new THREE.Quaternion().setFromUnitVectors(
    new THREE.Vector3(0,0,1),dir.clone().normalize()
  );
  return v.applyQuaternion(q);
}

function debutToRadius(debutYear){
  return (2026 - debutYear) * 9.2 + 6;
}

// 데뷔일 기준 정확한 연차 계산 (달력연도 뺄셈 대신 실제 경과일 사용 — NCT 127 같은 '10주년 임박' 그룹 오조기 판정 방지)
function _isLegacyGroup(debutStr){
  const parts=String(debutStr||'').split('.').map(Number);
  if(!parts[0])return false;
  const d=new Date(parts[0],(parts[1]||1)-1,parts[2]||1);
  const ageYears=(Date.now()-d.getTime())/(365.25*24*3600*1000);
  return ageYears>=10;
}

// ── Build universe ────────────────────────────────
async function buildUniverse(){
  const [grpData,artData,connData]=await Promise.all([
    fetch('groups.json').then(r=>r.json()),
    fetch('artists.json').then(r=>r.json()),
    fetch('connections.json').then(r=>r.json())
  ]);
  document.getElementById('loading').style.display='none';
  GROUPS=grpData;ARTISTS=artData;
  renderFavList();_buildBdayList();
  renderScrapList();
  placeMyStarInUniverse();

  // ── Bidirectional 'with' expansion ──────────────────
  (function expandWith(){
    function resolveWith(str,srcGroup){
      const m=str.match(/^(.+)\((.+)\)$/);
      return m?{name:m[1],group:m[2]}:{name:str,group:srcGroup};
    }
    function fmtFor(name,group,targetGroup){
      return group===targetGroup?name:`${name}(${group})`;
    }
    const snap=artData.map(a=>({a,songs:[...(a.songs||[])]}));
    snap.forEach(({a,songs})=>{
      songs.forEach(song=>{
        if(!song.with||!song.with.length)return;
        song.with.forEach(withStr=>{
          const {name:tName,group:tGroup}=resolveWith(withStr,a.group.ko);
          const target=artData.find(b=>b.name.ko===tName&&b.group.ko===tGroup);
          if(!target)return;
          if(!target.songs)target.songs=[];
          if(target.songs.some(s=>s.u===song.u))return;
          const reverseWith=[fmtFor(a.name.ko,a.group.ko,target.group.ko)];
          song.with.forEach(w=>{
            if(w===withStr)return;
            const {name:wn,group:wg}=resolveWith(w,a.group.ko);
            reverseWith.push(fmtFor(wn,wg,target.group.ko));
          });
          const ns={t:song.t,u:song.u,with:reverseWith};
          if(song.type)ns.type=song.type;
          target.songs.push(ns);
        });
      });
    });
  })();

  const memberMap={};
  const artistByName={};
  artData.forEach(a=>{
    a._worldPositions=[];
    _artistGroups(a).forEach(g=>{
      const k=g.ko;
      if(!memberMap[k])memberMap[k]=[];
      if(!memberMap[k].includes(a))memberMap[k].push(a);
    });
    artistByName[a.name.ko]=a;
  });

  const isMobile=window.innerWidth<=768;
  const opScale=isMobile?0.8:1.0;
  const regularPos=[],regularColors=[];
  const sparklePos=[],sparkleColors=[];
  let regularIdx=0,sparkleIdx=0;

  const _placedBubbles=[];
  Object.entries(grpData).forEach(([ko,info])=>{
    const members=memberMap[ko]||[];
    const distBase=debutToRadius(parseInt(info.debut)||2020);
    const dir=agencyDir(info.co);
    const [r,g,b]=info.color||[180,180,200];
    const color=duneColor(r,g,b);
    const radius=Math.min(4,Math.max(2,1.8+members.length*0.25));

    // 겹침 방지: 최대 400번 시도, 기존 행성과 표면 간격 4 이상 확보.
    // 같은 데뷔연도 그룹끼리 얇은 구 껍질에 몰리지 않도록 반경에 랜덤 변주를 줌
    let pos;
    for(let _t=0;_t<400;_t++){
      const dist=distBase*(0.84+Math.random()*0.32);
      const c=randomInCone(dir,coneSpread(info.co)).multiplyScalar(dist);
      if(_placedBubbles.every(pb=>c.distanceTo(pb.pos)>=radius+pb.r+4)){pos=c;break;}
    }
    if(!pos)pos=randomInCone(dir,coneSpread(info.co)).multiplyScalar(distBase);
    _placedBubbles.push({pos,r:radius});

    // ── Bubble fill — Fresnel ShaderMaterial ──────
    const fillGeo=new THREE.SphereGeometry(radius,64,64);
    const fillMat=new THREE.ShaderMaterial({
      uniforms:{
        uColor:{value:color},
        uFresnelMult:{value:0.15},
        uBaseOp:{value:0.0},
        uFillOp:{value:0.0},
        uSunDir:{value:new THREE.Vector3(0.6,0.8,0.4).normalize()},
        uFilterOp:{value:1.0},
        uSpecMult:{value:1.0},
        uSpecPow:{value:52.0},
        uAmbient:{value:0.18}
      },
      vertexShader:`
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main(){
          vNormal=normalize(mat3(modelMatrix)*normal);
          vec4 worldPos=modelMatrix*vec4(position,1.0);
          vViewDir=normalize(cameraPosition-worldPos.xyz);
          gl_Position=projectionMatrix*viewMatrix*worldPos;
        }`,
      fragmentShader:`
        uniform vec3 uColor;
        uniform float uFresnelMult;
        uniform float uBaseOp;
        uniform float uFillOp;
        uniform vec3 uSunDir;
        uniform float uFilterOp;
        uniform float uSpecMult;
        uniform float uSpecPow;
        uniform float uAmbient;
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main(){
          vec3 n=gl_FrontFacing?normalize(vNormal):-normalize(vNormal);
          vec3 v=normalize(vViewDir);
          float vd=max(0.0,dot(n,v));
          float fresnel=pow(1.0-vd,1.8);
          vec3 l=normalize(uSunDir);
          float lambert=max(0.0,dot(n,l));
          float diffuse=uAmbient+(1.0-uAmbient)*lambert;
          vec3 h=normalize(l+v);
          float spec=pow(max(0.0,dot(n,h)),uSpecPow)*uSpecMult;
          // 색으로 명암 표현 (alpha를 낮추지 않으므로 검은 고리 없음)
          vec3 col=uColor*(diffuse+0.10)+vec3(spec*0.20);
          // alpha: close-up에서만 투명, 줌아웃 시 불투명
          float alpha=(uBaseOp+uFillOp+fresnel*uFresnelMult)*uFilterOp;
          gl_FragColor=vec4(clamp(col,0.0,1.0),clamp(alpha,0.0,1.0));
        }`,
      transparent:true,side:THREE.DoubleSide,depthWrite:false
    });
    const bubble=new THREE.Mesh(fillGeo,fillMat);
    bubble.position.copy(pos);
    bubble._isLegacy=_isLegacyGroup(info.debut);
    scene.add(bubble);
    // ── Group label ───────────────────────────────
    const div=document.createElement('div');
    div.className='group-label';
    div.textContent=ko;
    div.style.color=`rgb(${Math.min(255,r*2.2|0)},${Math.min(255,g*2.2|0)},${Math.min(255,b*2.4|0)})`;
    div.style.cursor='pointer';
    div.addEventListener('click',e=>{
      e.stopPropagation();
      const bm=bubbleMeshes.find(b=>b.ko===ko);
      if(bm)flyToBubble(bm.mesh.position,bm.radius);
      const _ttEl=document.getElementById('tt');
      const _ttInSide=!isMob()&&sidePanelEl.classList.contains('open')&&_ttEl.parentElement===sidePanelEl;
      if(_ttInSide){
        const _cWas=connPanelEl.classList.contains('open');
        const _cAnc=_connAnchor;
        if(_cWas)closeConnCard();
        showGC(ko,window.innerWidth/2,window.innerHeight*0.4);
        openMemberPanel(_ttEl);
        if(_cWas&&_cAnc)openConnCard(_cAnc);
      }else{
        closeCards();
        showGC(ko,window.innerWidth/2,window.innerHeight*0.4);
      }
      pulseGroup(ko);
    });
    const label=new THREE.CSS2DObject(div);
    label.position.set(0,radius+0.3,0);
    bubble.add(label);
    groupLabels.push({el:div,worldPos:pos.clone(),ko,en:info.en||ko});
    bubbleMeshes.push({mesh:bubble,ko,info,radius,labelEl:div});

    // ── Collect member positions ───────────────────
    const _placedMPos=[];
    const _minSep=radius*0.28; // 최소 간격: 행성 반지름의 28%
    members.forEach(m=>{
      const [mr,mg,mb]=m.color||[r,g,b];
      const mColor=duneColor(mr,mg,mb);

      let mPos,tries=0;
      do{
        const phi2=Math.acos(2*Math.random()-1);
        const theta=Math.random()*Math.PI*2;
        const rr=Math.cbrt(Math.random())*radius*0.72;
        mPos=pos.clone().add(new THREE.Vector3(
          rr*Math.sin(phi2)*Math.cos(theta),
          rr*Math.sin(phi2)*Math.sin(theta),
          rr*Math.cos(phi2)
        ));
        tries++;
      }while(tries<40&&_placedMPos.some(p=>p.distanceTo(mPos)<_minSep));
      _placedMPos.push(mPos.clone());

      const spColor=m.sparkle?mColor.clone().lerp(new THREE.Color(1,1,1),0.25):mColor;
      const pArr=m.sparkle?sparklePos:regularPos;
      const cArr=m.sparkle?sparkleColors:regularColors;
      const aArr=m.sparkle?sparkleArtists:regularArtists;
      pArr.push(mPos.x,mPos.y,mPos.z);
      cArr.push(spColor.r,spColor.g,spColor.b);
      aArr.push(m);
      const _pType=m.sparkle?'sparkle':'regular';
      const _pIdx=m.sparkle?sparkleIdx++:regularIdx++;
      const _origCol=[spColor.r,spColor.g,spColor.b];
      m._worldPositions.push({groupKo:ko,pos:mPos.clone(),ptsType:_pType,ptsIdx:_pIdx,origColor:_origCol});
      // 첫 번째 그룹(primary) 위치만 _worldPos 등에 세팅
      if(!m._worldPos){
        m._worldPos=mPos.clone();
        m._origColor=_origCol;
        m._ptsType=_pType;
        m._ptsIdx=_pIdx;
        m._bdayYear=parseInt(m.bday)||0;
        m._filterAlpha=1; m._filterTarget=1;
      }
    });
  });

  // ── Connection lines ──────────────────────────────
  connData.forEach(conn=>{
    if(conn.type!=='member')return;
    const candA=artData.filter(a=>a.name.ko===conn.a);
    const candB=artData.filter(a=>a.name.ko===conn.b);
    let artA,artB;
    for(const ca of candA){const cb=candB.find(b=>b.group.ko===ca.group.ko);if(cb){artA=ca;artB=cb;break;}}
    if(!artA||!artB||!artA._worldPos||!artB._worldPos)return;
    const geo=new THREE.BufferGeometry().setFromPoints([artA._worldPos,artB._worldPos]);
    let mat;
    if(conn.type==='member'){
      const grpInfo=grpData[artA.group.ko]||{};
      const[r,g,b]=grpInfo.color||[180,180,200];
      const col=duneColor(r,g,b);
      mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.15,depthWrite:false});
    }else{
      mat=new THREE.LineDashedMaterial({color:0xffffff,transparent:true,opacity:0.1,dashSize:1.2,gapSize:0.9,depthWrite:false});
    }
    const line=new THREE.Line(geo,mat);
    if(conn.type!=='member')line.computeLineDistances();
    line.visible=false;
    scene.add(line);
    const mid=artA._worldPos.clone().lerp(artB._worldPos,0.5);
    connLines.push({line,mid,baseOp:mat.opacity});
  });

  // ── Member points (fixed pixel size, camera-distance independent) ──
  function makePoints(positions,colors,sizeW,opacity){
    if(!positions.length)return;
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(positions),3));
    geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(colors),3));
    const mat=new THREE.PointsMaterial({
      size:sizeW/Math.min(window.devicePixelRatio,2),map:glowTex,vertexColors:true,
      transparent:true,opacity,
      depthWrite:false,blending:THREE.AdditiveBlending,
      sizeAttenuation:true
    });
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);
    return pts;
  }
  regularPts=makePoints(regularPos,regularColors,isMobile?3.5:5.6,0.82*opScale);
  sparklePts=makePoints(sparklePos,sparkleColors,isMobile?7:12.8,1.0*opScale);
  if(regularPts)regColorAttr=regularPts.geometry.attributes.color;
  if(sparklePts)spkColorAttr=sparklePts.geometry.attributes.color;

  // ── NCT Family Rings (아주 얇은 단색 스트로크를 간격 없이 촘촘히 쌓아 부드러운 그라데이션처럼 보이게) ─────
  // 각 선 자체는 여전히 그라데이션 없는 단색이지만, 개수를 늘리고 두께=간격으로 맞춰 틈을 없애 자연스럽게 이어붙임
  _nctRingGroups=[];
  const _RING_STROKE_N=27;      // 중앙 포함 총 스트로크 수(홀수 → 중앙 1개 + 안팎 13개씩)
  bubbleMeshes.filter(b=>b.ko.startsWith('NCT')).forEach(({mesh,radius:R,ko:_rko})=>{
    const g=new THREE.Group();
    g.position.copy(mesh.position);
    g.quaternion.setFromEuler(new THREE.Euler(Math.PI*0.22,Math.PI*0.07,0));
    g.renderOrder=5; // 반투명 행성과의 프레임별 정렬 뒤집힘(반달로 잘려 보이는 원인) 방지 — 항상 행성 위에 고정 렌더

    const centerR=R*1.775;
    const halfSpan=R*0.12;                         // 중앙에서 가장자리까지 반지름 거리
    const gap=(halfSpan*2)/(_RING_STROKE_N-1);      // 스트로크 중심 간 간격
    const strokeW=gap;                              // 두께=간격 → 서로 맞닿아 빈틈 없음
    const _baseOps=[];
    for(let i=0;i<_RING_STROKE_N;i++){
      const off=-halfSpan+gap*i;                    // 중앙 기준 오프셋(-halfSpan ~ +halfSpan)
      const d=Math.abs(off)/halfSpan;                // 0(중앙)~1(가장자리) 정규화 거리
      const op=0.8*Math.pow(1-d,2.4);                // 부드러운 곡선으로 감쇠, 가장자리에서 0
      const radius=centerR+off;
      const geo=new THREE.RingGeometry(radius-strokeW/2,radius+strokeW/2,96,1);
      const mat=new THREE.MeshBasicMaterial({color:0x66ddaa,transparent:true,opacity:op,side:THREE.DoubleSide,depthWrite:false,depthTest:false,blending:THREE.AdditiveBlending});
      g.add(new THREE.Mesh(geo,mat));
      _baseOps.push(op);
    }

    scene.add(g);
    _nctRingGroups.push({g,ko:_rko,baseOps:_baseOps});
  });
}

function animate(){
  requestAnimationFrame(animate);
  if(flyState.active){
    const raw=Math.min((performance.now()-flyState.t0)/flyState.dur,1);
    const k=easeInOut(raw);
    camera.position.lerpVectors(flyState.fromCam,flyState.toCam,k);
    controls.target.lerpVectors(flyState.fromOrbit,flyState.toOrbit,k);
    if(raw>=1){
      flyState.active=false;
      controls.enabled=true;
      if(flyState.onComplete){flyState.onComplete();flyState.onComplete=null;}
    }
  }
  controls.update();
  connLines.forEach(({line,mid,baseOp})=>{
    line.visible=filterCfg.connLines&&camera.position.distanceTo(mid)<20;
    if(line.visible){
      const tgt=focusGroupKo?baseOp*0.18:baseOp;
      line.material.opacity+=(tgt-line.material.opacity)*0.10;
    }
  });
  // 줌 레벨: 카메라~원점 거리 기반 (홈≈120, 최대≈300)
  const camDist=camera.position.length();
  const zoomT=Math.max(0,Math.min(1,(camDist-90)/190));
  const zoomBoost=-(Math.cos(Math.PI*zoomT)-1)/2;
  let colorsDirty=false;
  bubbleMeshes.forEach(({mesh,labelEl})=>{
    const dist=camera.position.distanceTo(mesh.position);
    const t=Math.max(0,Math.min(1,(dist-15)/100));
    const f=-(Math.cos(Math.PI*t)-1)/2;
    mesh.material.uniforms.uFillOp.value=f*(0.68+zoomBoost*0.28);
    mesh.material.uniforms.uBaseOp.value=0;
    mesh.material.uniforms.uFresnelMult.value=0.26+zoomBoost*0.32;
    mesh.material.uniforms.uSpecMult.value=1.6+zoomBoost*8.0;
    mesh.material.uniforms.uSpecPow.value=55.0+zoomBoost*240.0;
    mesh.material.uniforms.uAmbient.value=0.46-zoomBoost*0.08;
    const ftgt=mesh._filterTarget??1;
    mesh._filterAlpha=mesh._filterAlpha??1;
    mesh._filterAlpha+=(ftgt-mesh._filterAlpha)*0.22;
    mesh._focusTarget=mesh._focusTarget??1;
    mesh._focusAlpha=mesh._focusAlpha??1;
    mesh._focusAlpha+=(mesh._focusTarget-mesh._focusAlpha)*0.10;
    // 레거시(데뷔 10년+) 행성: 멀리서는 은은하게 죽이고, 가까이 다가가면 다시 선명하게
    const legacyTarget=mesh._isLegacy?(dist<26?1:dist<80?1-((dist-26)/54)*0.82:0.18):1;
    mesh._legacyAlpha=mesh._legacyAlpha??1;
    mesh._legacyAlpha+=(legacyTarget-mesh._legacyAlpha)*0.06;
    mesh.material.uniforms.uFilterOp.value=mesh._filterAlpha*mesh._focusAlpha*mesh._legacyAlpha;
  });
  _nctRingGroups.forEach(({g,ko,baseOps})=>{
    const bm=bubbleMeshes.find(b=>b.ko===ko);
    if(!bm)return;
    const alpha=(bm.mesh._filterAlpha??1)*(bm.mesh._focusAlpha??1)*(bm.mesh._legacyAlpha??1);
    g.children.forEach((c,i)=>{if(c.material)c.material.opacity=(baseOps[i]??0)*alpha;});
  });
  ARTISTS.forEach(a=>{
    if(a._ptsType===undefined)return;
    const prev=a._filterAlpha;
    a._filterAlpha+=(a._filterTarget-prev)*0.22;
    a._focusTarget=a._focusTarget??1;
    a._focusAlpha=a._focusAlpha??1;
    const prevF=a._focusAlpha;
    a._focusAlpha+=(a._focusTarget-prevF)*0.10;
    if(a._flashPulse>0.005){a._flashPulse*=0.84;colorsDirty=true;}else{a._flashPulse=0;}
    // 즐겨찾기한 멤버는 흰색 쪽으로 살짝 lerp해서 더 밝게
    const favTarget=favMembers.has(_mFavKey(a))?1:0;
    a._favAlpha=a._favAlpha??favTarget;
    const prevFav=a._favAlpha;
    a._favAlpha+=(favTarget-prevFav)*0.12;
    if(Math.abs(a._filterAlpha-prev)<0.0005&&Math.abs(a._focusAlpha-prevF)<0.0005&&Math.abs(a._favAlpha-prevFav)<0.0005&&!a._flashPulse)return;
    const fa=Math.min(1,a._filterAlpha*a._focusAlpha+(a._flashPulse||0));
    const favBoost=a._favAlpha*0.4;
    (a._worldPositions||[]).forEach(wp=>{
      const attr=wp.ptsType==='sparkle'?spkColorAttr:regColorAttr;
      if(!attr)return;
      const i=wp.ptsIdx*3;
      attr.array[i]=Math.min(1,(wp.origColor[0]+(1-wp.origColor[0])*favBoost)*fa);
      attr.array[i+1]=Math.min(1,(wp.origColor[1]+(1-wp.origColor[1])*favBoost)*fa);
      attr.array[i+2]=Math.min(1,(wp.origColor[2]+(1-wp.origColor[2])*favBoost)*fa);
    });
    colorsDirty=true;
  });
  if(colorsDirty){if(regColorAttr)regColorAttr.needsUpdate=true;if(spkColorAttr)spkColorAttr.needsUpdate=true;}
  groupLabels.forEach(({el,worldPos,ko})=>{
    const d=camera.position.distanceTo(worldPos);
    const distFade=d<40?1:d<70?(70-d)/30:0;
    const bm=bubbleMeshes.find(b=>b.ko===ko);
    const fa=(bm?bm.mesh._filterAlpha??1:1)*(bm?bm.mesh._focusAlpha??1:1)*(bm?bm.mesh._legacyAlpha??1:1);
    const op=distFade*fa;
    el.style.opacity=op.toFixed(3);
    el.style.pointerEvents=op>0.15?'auto':'none';
  });
  if(_myStarLines.length){
    const _msd=camera.position.distanceTo(myStarSprite?myStarSprite.position:new THREE.Vector3());
    const _mAlpha=Math.max(0,Math.min(1,(_msd-10)/60));
    _myStarLines.forEach(l=>{
      const base=l.material instanceof THREE.LineDashedMaterial?0.28:0.55;
      l.material.opacity=base*_mAlpha;
    });
  }
  if(myStarSprite){
    const _st=performance.now()*0.001;
    myStarSprite.scale.setScalar(myStarBase*(0.88+Math.sin(_st*1.15)*0.12));
    myStarSprite.material.opacity=0.80+Math.sin(_st*0.85+1.0)*0.16;
    if(myStarLabel){
      const _sd=camera.position.distanceTo(myStarSprite.position);
      const _so=_sd<50?1:_sd<85?(85-_sd)/35:0;
      myStarLabel.element.style.opacity=_so.toFixed(3);
      myStarLabel.element.style.pointerEvents=_so>0.15?'auto':'none';
    }
  }
  _nctRingGroups.forEach(({g})=>g.rotateZ(0.00028));
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
  if(window._syncZoomSlider)_syncZoomSlider();
}

// ── Search & fly-to ───────────────────────────────
function _startFly(toOrbit,toCam,dur){
  controls.autoRotate=false;
  controls.enabled=false;
  flyState.fromCam.copy(camera.position);
  flyState.fromOrbit.copy(controls.target);
  flyState.toOrbit.copy(toOrbit);
  flyState.toCam.copy(toCam);
  flyState.t0=performance.now();
  flyState.dur=dur||800;
  flyState.active=true;
}
function flyTo(pos,dur){
  if(!pos)return;
  const dir=camera.position.clone().sub(controls.target).normalize();
  if(dir.lengthSq()<0.001)dir.set(0,0,1);
  _startFly(pos,pos.clone().addScaledVector(dir,22),dur||800);
}
function flyToBubble(pos,radius){
  const dir=camera.position.clone().sub(pos).normalize();
  if(dir.lengthSq()<0.001)dir.set(0,0,1);
  // 정면 충돌 느낌 없애기: 위에서 살짝 비스듬히 + 거리 여유
  const tilted=new THREE.Vector3(dir.x*0.8,dir.y+0.28,dir.z*0.8).normalize();
  _startFly(pos,pos.clone().addScaledVector(tilted,radius*5.5),1000);
}
function _setNctRingScale(scale){
  _nctRingGroups.forEach(({g,baseOps})=>{
    g.children.forEach((c,i)=>{if(c.material)c.material.opacity=baseOps[i]*scale;});
  });
}
function flyToFitPositions(positions,dur){
  if(!positions||!positions.length)return;
  if(positions.length===1){flyTo(positions[0],dur);return;}
  const center=new THREE.Vector3();
  positions.forEach(p=>center.add(p));
  center.divideScalar(positions.length);
  let maxDist=0;
  positions.forEach(p=>{maxDist=Math.max(maxDist,center.distanceTo(p));});
  const dir=camera.position.clone().sub(controls.target).normalize();
  if(dir.lengthSq()<0.001)dir.set(0,0.3,1).normalize();
  _startFly(center,center.clone().addScaledVector(dir,maxDist*2.8+35),dur||1000);
}

function _mScore(name,q,ql){
  const n=(name||'').toLowerCase();
  if(name===q||n===ql)return 0;
  if(name.startsWith(q)||n.startsWith(ql))return 1;
  return 2;
}
function doSearch(q){
  const mobSearch=isMob()&&document.getElementById('tabbar').classList.contains('search-mode');
  const res=mobSearch?document.getElementById('mob-sr'):document.getElementById('search-results');
  q=q.trim();
  if(!q){
    if(mobSearch){res.classList.remove('open');res.innerHTML='';}
    else{res.style.display='none';}
    return;
  }
  const ql=q.toLowerCase();
  const hits=[];
  Object.keys(GROUPS).forEach(ko=>{
    const info=GROUPS[ko];
    const enN=info.en||'';
    if(ko.includes(q)||enN.toLowerCase().includes(ql)){
      const bm=bubbleMeshes.find(b=>b.ko===ko);
      if(bm){
        const s=Math.min(_mScore(ko,q,ql),_mScore(enN,q,ql));
        hits.push({type:'group',name:currentLang==='ko'?ko:(info.en||ko),pos:bm.mesh.position.clone(),data:ko,score:s+0.5});
      }
    }
  });
  ARTISTS.forEach(a=>{
    const koN=a.name.ko,enN=a.name.en||'';
    if(koN.includes(q)||enN.toLowerCase().includes(ql)){
      const s=Math.min(_mScore(koN,q,ql),_mScore(enN,q,ql));
      hits.push({type:'member',name:currentLang==='ko'?koN:(a.name.en||koN),sub:currentLang==='ko'?a.group.ko:(a.group.en||a.group.ko),pos:a._worldPos,data:a,score:s});
    }
  });
  hits.sort((a,b)=>a.score-b.score);
  res.innerHTML='';
  hits.slice(0,8).forEach(h=>{
    const div=document.createElement('div');
    div.className='sr-item';
    div.innerHTML=`<span>${h.name}</span><span class="sr-tag">${h.type==='group'?T[currentLang].srGroup:h.sub}</span>`;
    div.addEventListener('click',e=>{
      e.stopPropagation();
      closeCards();
      flyTo(h.pos);
      if(mobSearch){
        exitMobSearch();
      }else{
        document.getElementById('search-input').value='';
        res.style.display='none';
        closePanels();
      }
      const cx=window.innerWidth/2,cy=window.innerHeight*0.38;
      if(h.type==='group'){showGC(h.data,cx,cy);pulseGroup(h.data);}
      else{showT(h.data,cx,cy);pulseMember(h.data);pulseGroup(h.data.group.ko);}
    });
    res.appendChild(div);
  });
  if(mobSearch){res.classList.toggle('open',hits.length>0);}
  else{res.style.display=hits.length?'block':'none';}
}

function ytId(u){
  if(!u)return'';
  const m=u.match(/(?:youtu\.be\/|[?&]v=|\/embed\/)([A-Za-z0-9_-]{11})/);
  if(m)return m[1];
  const s=u.match(/\/shorts\/([A-Za-z0-9_-]{11})/);
  return s?s[1]:'';
}
function isShorts(u){return /\/shorts\//.test(u||'');}

function addHoverPreview(wrapEl,imgEl,videoId,shorts){
  if(!videoId)return;
  let iframe=null;
  wrapEl.addEventListener('mouseenter',()=>{
    if(isMob()||iframe)return;
    iframe=document.createElement('iframe');
    iframe.src=`https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&start=30&controls=0&modestbranding=1&rel=0`;
    iframe.allow='autoplay; encrypted-media';
    iframe.style.cssText=`width:100%;aspect-ratio:${shorts?'9/16':'16/9'};display:block;border:none;`;
    wrapEl.replaceChild(iframe,imgEl);
  });

  });
}

function _shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function buildVideoSection(songs,containerEl,ctx){
  containerEl.innerHTML='';
  const all=(songs||[]);
  if(!all.length){
    const p=document.createElement('div');p.className='tv-empty';
    p.textContent=T[currentLang].preparing;containerEl.appendChild(p);return;
  }
  if(isMob()){
    const normSongs=all.filter(s=>!isShorts(s.u));
    const shortSongs=all.filter(s=>isShorts(s.u));
    if(normSongs.length>0){
      const first=normSongs[0];
      const bigWrap=document.createElement('div');bigWrap.id='tv-big-wrap';
      const big=document.createElement('img');big.id='tv-big';
      big.src=`https://img.youtube.com/vi/${ytId(first.u)}/mqdefault.jpg`;big.alt=first.t;
      const bigTitle=document.createElement('div');bigTitle.id='tv-big-title';bigTitle.textContent=first.t;
      addMarquee(bigTitle);
      bigWrap.appendChild(big);bigWrap.appendChild(bigTitle);
      bigWrap.appendChild(_makeScrapBtn(first,ctx));
      addHoverPreview(bigWrap,big,ytId(first.u),false);
      bigWrap.addEventListener('click',e=>{e.stopPropagation();window.open(first.u,'_blank');});
      containerEl.appendChild(bigWrap);
      const normRest=_shuffle(normSongs.slice(1));
      if(normRest.length>0){
        const moreWrap=document.createElement('div');moreWrap.className='tv-more-wrap open';
        normRest.forEach((s,i)=>{
          const thumb=makeSmallThumb(s,all,0,ctx);
          if(normRest.length%2===1&&i===normRest.length-1)thumb.style.flex='0 0 100%';
          moreWrap.appendChild(thumb);
        });
        containerEl.appendChild(moreWrap);
      }
    }
    if(shortSongs.length>0){
      _shuffle(shortSongs);
      const grid=document.createElement('div');grid.className='mob-shorts-grid';
      shortSongs.slice(0,2).forEach(s=>grid.appendChild(makeSmallThumb(s,all,0,ctx)));
      containerEl.appendChild(grid);
      if(shortSongs.length>2){
        const moreGrid=document.createElement('div');moreGrid.className='mob-shorts-grid tv-more-wrap open';
        moreGrid.style.display='grid';
        shortSongs.slice(2).forEach(s=>moreGrid.appendChild(makeSmallThumb(s,all,0,ctx)));
        containerEl.appendChild(moreGrid);
      }
    }
    return;
  }
  // ── 데스크탑 ─────────────────────────────────────
  const first=all[0];
  const firstShorts=isShorts(first.u);
  const bigWrap=document.createElement('div');bigWrap.id='tv-big-wrap';
  if(firstShorts)bigWrap.classList.add('is-shorts');
  const big=document.createElement('img');big.id='tv-big';
  big.src=`https://img.youtube.com/vi/${ytId(first.u)}/mqdefault.jpg`;big.alt=first.t;
  const bigTitle=document.createElement('div');bigTitle.id='tv-big-title';bigTitle.textContent=first.t;
  addMarquee(bigTitle);
  bigWrap.appendChild(big);bigWrap.appendChild(bigTitle);
  bigWrap.appendChild(_makeScrapBtn(first,ctx));
  addHoverPreview(bigWrap,big,ytId(first.u),firstShorts);
  bigWrap.addEventListener('click',e=>{e.stopPropagation();openLightbox(first.u,firstShorts);});
  containerEl.appendChild(bigWrap);
  const rest=all.slice(1);if(!rest.length)return;
  const sArr=_shuffle(rest.filter(s=>isShorts(s.u)));
  const lArr=_shuffle(rest.filter(s=>!isShorts(s.u)));
  if(sArr.length%2!==0)sArr.pop();
  const lPairs=[],sPairs=[];
  for(let i=0;i<lArr.length;i+=2)lPairs.push(lArr.slice(i,i+2));
  for(let i=0;i<sArr.length;i+=2)sPairs.push(sArr.slice(i,i+2));
  const ordered=[];
  const step=sPairs.length>0?lPairs.length/(sPairs.length+1):Infinity;
  let si=0,next=step;
  lPairs.forEach((lp,i)=>{
    ordered.push(...lp);
    if(si<sPairs.length&&i+1>=next){ordered.push(...sPairs[si++]);next+=step;}
  });
  while(si<sPairs.length)ordered.push(...sPairs[si++]);
  const grid=document.createElement('div');grid.id='tv-grid';
  ordered.forEach(s=>grid.appendChild(makeSmallThumb(s,all,0,ctx)));
  containerEl.appendChild(grid);
}

let _mobViewShift=0,_mobViewShiftRaf=null;
function _animMobViewShift(target,dur){
  const start=_mobViewShift;
  const t0=performance.now();
  cancelAnimationFrame(_mobViewShiftRaf);
  function tick(){
    const raw=Math.min((performance.now()-t0)/(dur||340),1);
    const k=easeInOut(raw);
    _mobViewShift=start+(target-start)*k;
    const W=window.innerWidth,H=window.innerHeight;
    if(Math.abs(_mobViewShift)<0.5){camera.clearViewOffset();_mobViewShift=0;}
    else{camera.setViewOffset(W,H,0,Math.round(_mobViewShift),W,H);}
    if(raw<1)_mobViewShiftRaf=requestAnimationFrame(tick);
  }
  _mobViewShiftRaf=requestAnimationFrame(tick);
}

let _connAnchor=null,_connSelected=[],_connLines3d=[],_connPanelShifted=false;

function _findArtistByConnName(withStr,anchorGroupKo){
  const m=withStr.match(/^(.+)\((.+)\)$/);
  if(m)return ARTISTS.find(a=>a.name.ko===m[1]&&a.group.ko===m[2]);
  return ARTISTS.find(a=>a.name.ko===withStr&&a.group.ko===anchorGroupKo);
}
function _dedupSongs(songs){
  const seen=new Set();
  return songs.filter(sg=>{if(seen.has(sg.u))return false;seen.add(sg.u);return true;});
}
function _getSongsFeaturingArtist(a){
  const myName=a.name.ko;
  const res=[];
  ARTISTS.forEach(other=>{
    if(other===a)return;
    (other.songs||[]).forEach(sg=>{
      if((sg.with||[]).includes(myName))res.push({...sg,_owner:other});
    });
  });
  return res;
}
function _getCollabMembers(artist){
  const s=new Set();
  (artist.songs||[]).forEach(sg=>{(sg.with||[]).forEach(n=>s.add(n));});
  const myName=artist.name.ko;
  ARTISTS.forEach(other=>{
    if(other===artist)return;
    (other.songs||[]).forEach(sg=>{
      if((sg.with||[]).includes(myName)){
        const ownerStr=other.group.ko===artist.group.ko?other.name.ko:`${other.name.ko}(${other.group.ko})`;
        s.add(ownerStr);
      }
    });
  });
  return[...s];
}
function _getCollabSongs(anchor,sel){
  if(!sel.length)return[];
  const allSongs=[...(anchor.songs||[]).map(sg=>({...sg,_owner:anchor})),..._getSongsFeaturingArtist(anchor)];
  return _dedupSongs(allSongs.filter(sg=>
    sel.every(selName=>{
      const selA=_findArtistByConnName(selName,anchor.group.ko);
      if(!selA)return false;
      if(sg._owner===selA)return true;
      return(sg.with||[]).some(w=>_findArtistByConnName(w,anchor.group.ko)===selA);
    })
  ));
}
function _clearConnLines3d(){
  _connLines3d.forEach(l=>scene.remove(l));_connLines3d=[];
}
function _updateConnLines3d(){
  _clearConnLines3d();
  if(!_connAnchor||!_connAnchor._worldPos)return;
  const col=_connAnchor.color||[140,180,255];
  const hexCol=new THREE.Color(col[0]/255,col[1]/255,col[2]/255).multiplyScalar(1.6);
  _connSelected.forEach(name=>{
    const other=_findArtistByConnName(name,_connAnchor.group.ko);
    if(!other||!other._worldPos)return;
    const geo=new THREE.BufferGeometry().setFromPoints([_connAnchor._worldPos,other._worldPos]);
    const mat=new THREE.LineBasicMaterial({color:hexCol,transparent:true,opacity:0.72,depthWrite:false});
    const line=new THREE.Line(geo,mat);scene.add(line);_connLines3d.push(line);
  });
}
function _panelOffsetVec(dist){
  if(isMob())return new THREE.Vector3();
  const pw=(sidePanelEl.classList.contains('open')?320:0)
          +(memberPanelEl.classList.contains('open')?320:0)
          +(connPanelEl.classList.contains('open')?280:0);
  if(!pw)return new THREE.Vector3();
  const hFov=2*Math.atan(Math.tan(camera.fov*Math.PI/360)*camera.aspect);
  const worldW=2*dist*Math.tan(hFov/2);
  const shift=(pw/2/window.innerWidth)*worldW;
  return new THREE.Vector3().setFromMatrixColumn(camera.matrix,0).multiplyScalar(shift);
}
function _applyConnFocus(){
  if(!_connAnchor||!_connSelected.length){
    if(_connAnchor)setFocus(_connAnchor.group.ko);
    return;
  }
  const brightGroups=new Set([_connAnchor.group.ko]);
  const brightArtists=new Set([_connAnchor]);
  _connSelected.forEach(name=>{
    const other=_findArtistByConnName(name,_connAnchor.group.ko);
    if(other){brightArtists.add(other);brightGroups.add(other.group.ko);}
  });
  focusGroupKo=null;
  ARTISTS.forEach(a=>{a._focusTarget=brightArtists.has(a)?1:FOCUS_DIM;});
  bubbleMeshes.forEach(({mesh,ko})=>{mesh._focusTarget=brightGroups.has(ko)?1:FOCUS_DIM;});
}
function _flyToConnStars(){
  if(!_connAnchor)return;
  function _flyToBubbleOffset(bm){
    const pos=bm.mesh.position,r=bm.radius;
    const dir=camera.position.clone().sub(pos).normalize();
    if(dir.lengthSq()<0.001)dir.set(0,0.3,1).normalize();
    const tilted=new THREE.Vector3(dir.x*0.8,dir.y+0.28,dir.z*0.8).normalize();
    const dist=r*5.5;
    const off=_panelOffsetVec(dist);
    const orb=pos.clone().add(off);
    _startFly(orb,orb.clone().addScaledVector(tilted,dist),800);
  }
  if(!_connSelected.length){
    const bm=bubbleMeshes.find(b=>b.ko===_connAnchor.group.ko);
    if(bm)_flyToBubbleOffset(bm);
    return;
  }
  const involvedKos=new Set([_connAnchor.group.ko]);
  _connSelected.forEach(name=>{
    const other=_findArtistByConnName(name,_connAnchor.group.ko);
    if(other)involvedKos.add(other.group.ko);
  });
  const bms=[];
  involvedKos.forEach(ko=>{const bm=bubbleMeshes.find(b=>b.ko===ko);if(bm)bms.push(bm);});
  if(!bms.length)return;
  if(bms.length===1){_flyToBubbleOffset(bms[0]);return;}
  const center=new THREE.Vector3();
  bms.forEach(bm=>center.add(bm.mesh.position));
  center.divideScalar(bms.length);
  let maxSpread=0;
  bms.forEach(bm=>{maxSpread=Math.max(maxSpread,bm.mesh.position.distanceTo(center)+bm.radius*2.5);});
  const halfFov=camera.fov*Math.PI/360;
  const dist=Math.max(maxSpread/Math.tan(halfFov)*1.5,18);
  const tilt=new THREE.Vector3(
    camera.position.x-center.x,
    Math.abs(camera.position.y-center.y)*0.4+2,
    camera.position.z-center.z
  ).normalize();
  const off=_panelOffsetVec(dist);
  center.add(off);
  _startFly(center,center.clone().addScaledVector(tilt,dist),900);
}

      showT(target,window.innerWidth/2,window.innerHeight*0.4);

    wrap.appendChild(chip);wrap.appendChild(gotoBtn);

  });
  container.appendChild(chipsDiv);

  if(_connSelected.length>0){
    const vidLbl=document.createElement('div');vidLbl.className='conn-lbl';
    vidLbl.textContent=currentLang==='ko'?'함께한 영상':'together';
    container.appendChild(vidLbl);

    const songs=_getCollabSongs(_connAnchor,_connSelected);
    const _connCtx=_connAnchor?{groupKo:_connAnchor.group.ko,memberKo:_connAnchor.name.ko}:undefined;
    if(songs.length)buildVideoSection(songs,vidDiv,_connCtx);
    else{const e2=document.createElement('div');e2.className='conn-no-video';e2.textContent=currentLang==='ko'?'해당 조합의 영상이 없어요':'No video for this combination';vidDiv.appendChild(e2);}
    container.appendChild(vidDiv);
  }
}

function pulseGroupRipple(ko){
  const bm=bubbleMeshes.find(b=>b.ko===ko);
  if(!bm)return;
  const[r,g,b]=(bm.info&&bm.info.color)||[180,200,255];
  const sz=128,c=sz/2;
  const cv=document.createElement('canvas');cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  const grd=ctx.createRadialGradient(c,c,sz*0.28,c,c,sz*0.50);
  grd.addColorStop(0,`rgba(${r},${g},${b},0)`);
  grd.addColorStop(0.45,`rgba(${r},${g},${b},0.70)`);
  grd.addColorStop(0.75,`rgba(${r},${g},${b},0.18)`);
  grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.fillStyle=grd;ctx.fillRect(0,0,sz,sz);
  const tex=new THREE.CanvasTexture(cv);
  const rad=bm.radius;
  let done=0;
  function makeRipple(delay){
    setTimeout(()=>{
      const mat=new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthTest:false});
      const sp=new THREE.Sprite(mat);
      sp.position.copy(bm.mesh.position);
      sp.scale.setScalar(rad*2);
      scene.add(sp);
      const t0=performance.now(),dur=2800;
      (function tick(){
        const t=Math.min((performance.now()-t0)/dur,1);
        const ease=1-Math.pow(1-t,3.0);
        sp.scale.setScalar(rad*2+ease*rad*5.5);
        mat.opacity=Math.pow(1-t,0.85)*0.12;
        if(t<1)requestAnimationFrame(tick);
        else{scene.remove(sp);mat.dispose();if(++done===2)tex.dispose();}
      })();
    },delay);
  }
  makeRipple(0);
  makeRipple(1300);
}
function pulseGroup(ko){
  const bm=bubbleMeshes.find(b=>b.ko===ko);
  if(!bm)return;
  const mat=bm.mesh.material;
  const origF=mat.uniforms.uFresnelMult.value;
  const origB=mat.uniforms.uBaseOp.value;
  const t0=performance.now(),dur=2000;
  (function tick(){
    const t=Math.min((performance.now()-t0)/dur,1);
    const w=Math.sin(Math.PI*t); // 0 → peak → 0
    mat.uniforms.uFresnelMult.value=origF+w*0.28;
    mat.uniforms.uBaseOp.value=origB+w*0.10;
    if(t<1)requestAnimationFrame(tick);
    else{mat.uniforms.uFresnelMult.value=origF;mat.uniforms.uBaseOp.value=origB;}
  })();
}

function pulseMember(artist){
  const _positions=(artist._worldPositions||[]).map(wp=>wp.pos);
  if(!_positions.length){if(artist._worldPos)_positions.push(artist._worldPos);else return;}
  const [r,g,b]=artist.color||[255,255,255];
  // 부드러운 링 텍스처 (캔버스 방사형 그라디언트)
  const sz=128,c=sz/2;
  const cv=document.createElement('canvas');cv.width=cv.height=sz;
  const c2=cv.getContext('2d');
  const grd=c2.createRadialGradient(c,c,sz*0.30,c,c,sz*0.50);
  grd.addColorStop(0,`rgba(${r},${g},${b},0)`);
  grd.addColorStop(0.5,`rgba(${r},${g},${b},0.85)`);
  grd.addColorStop(0.78,`rgba(${r},${g},${b},0.25)`);
  grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
  c2.fillStyle=grd;c2.fillRect(0,0,sz,sz);
  const tex=new THREE.CanvasTexture(cv);

  function makeRipple(delay,pos){
    setTimeout(()=>{
      const mat=new THREE.SpriteMaterial({
        map:tex,transparent:true,opacity:0,
        blending:THREE.AdditiveBlending,depthTest:false
      });
      const sp=new THREE.Sprite(mat);
      sp.position.copy(pos);
      sp.scale.setScalar(0.05);
      scene.add(sp);
      const t0=performance.now(),dur=1600;
      (function tick(){
        const t=Math.min((performance.now()-t0)/dur,1);
        const ease=1-Math.pow(1-t,2.5);
        sp.scale.setScalar(0.05+ease*2.0);
        mat.opacity=Math.pow(1-t,0.7)*0.45;
        if(t<1)requestAnimationFrame(tick);
        else{scene.remove(sp);mat.dispose();}
      })();
    },delay);
  }
  _positions.forEach(pos=>{makeRipple(0,pos);makeRipple(780,pos);});
  setTimeout(()=>tex.dispose(),2600);
}

  ttMemberIdx=ttGroupMembers.findIndex(m=>m===a);
  if(ttMemberIdx<0)ttMemberIdx=0;
  const navEl=document.getElementById('tt-nav');
  const ctrEl=document.getElementById('tt-counter');
  navEl.style.display=ttGroupMembers.length>1?'flex':'none';
  ctrEl.textContent=ttGroupMembers.length>1?`${ttMemberIdx+1} / ${ttGroupMembers.length}`:'';
  // 다중 그룹 소속 멤버 → 각 행성 내 별 사이 선 연결 + 카메라 프레이밍
  if(a._worldPositions&&a._worldPositions.length>1){
    const SEG=48;
    for(let _i=0;_i<a._worldPositions.length-1;_i++){
      for(let _j=_i+1;_j<a._worldPositions.length;_j++){
        const wpA=a._worldPositions[_i],wpB=a._worldPositions[_j];
        const cA=((GROUPS[wpA.groupKo]||{}).color||[200,210,255]);
        const cB=((GROUPS[wpB.groupKo]||{}).color||[200,210,255]);
        const colA=new THREE.Color(cA[0]/255,cA[1]/255,cA[2]/255);
        const colB=new THREE.Color(cB[0]/255,cB[1]/255,cB[2]/255);
        const pts=[],cols=[];
        for(let s=0;s<=SEG;s++){
          const t=s/SEG;
          pts.push(wpA.pos.clone().lerp(wpB.pos,t));
          // sin curve: dim at star endpoints, bright in middle
          const bright=0.25+Math.sin(t*Math.PI)*0.75;
          const c=colA.clone().lerp(colB,t).multiplyScalar(bright*1.6);
          cols.push(c.r,c.g,c.b);
        }
        const geo=new THREE.BufferGeometry().setFromPoints(pts);
        geo.setAttribute('color',new THREE.Float32BufferAttribute(cols,3));
        const mat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:0.45,depthWrite:false,blending:THREE.AdditiveBlending});
        const line=new THREE.Line(geo,mat);scene.add(line);_memberCardLines.push(line);
      }
    }
    flyToFitPositions(a._worldPositions.map(wp=>wp.pos),950);
  }
}

// ── Filter ────────────────────────────────────────
function applyFilter(){
  const{debutLo,debutHi,bdayLo,bdayHi,gender,showInactive}=filterCfg;
  // 1단계: 그룹 레벨 필터 (데뷔연도·성별)
  bubbleMeshes.forEach(({mesh,ko,info})=>{
    const yr=parseInt(info.debut)||2020;
    const ok=(gender==='all'||info.gender===gender)&&yr>=debutLo&&yr<=debutHi;
    mesh._filterTarget=ok?1:0;
  });
  // 2단계: 멤버 레벨 필터 (생년·비활동)
  ARTISTS.forEach(a=>{
    const byr=a._bdayYear||0;
    const activeOk=showInactive||(a.active!==false);
    const bdayOk=byr===0||(byr>=bdayLo&&byr<=bdayHi);
    const grpMesh=bubbleMeshes.find(b=>b.ko===a.group.ko);
    const grpOk=grpMesh?(grpMesh.mesh._filterTarget??1)>0.5:true;
    a._filterTarget=(activeOk&&bdayOk&&grpOk)?1:0;
  });
  // 3단계: 보이는 멤버가 0명인 그룹은 버블도 숨김
  bubbleMeshes.forEach(({mesh,ko})=>{
    if(mesh._filterTarget===0)return;
    const members=ARTISTS.filter(a=>_artistGroups(a).some(g=>g.ko===ko));
    if(members.length>0&&members.every(a=>a._filterTarget===0))mesh._filterTarget=0;
  });
}

function _renderTagChip(el,text,type,value){
  el.innerHTML='';
  if(!text)return;
  const chip=document.createElement('span');
  chip.className='tag-chip'+(_tagFilter.type===type&&_tagFilter.value===value?' active':'');
  chip.dataset.filterType=type;chip.dataset.filterValue=value;
  chip.textContent=text;
  chip.addEventListener('click',e=>{e.stopPropagation();applyTagFilter(type,value);});
  el.appendChild(chip);
}

function _refreshTagChips(){
  document.querySelectorAll('.tag-chip').forEach(chip=>{
    const isActive=!!(_tagFilter.type&&chip.dataset.filterType===_tagFilter.type&&chip.dataset.filterValue===_tagFilter.value);
    chip.classList.toggle('active',isActive);
  });
}

function _getNatKo(nat){
  if(!nat)return null;
  return typeof nat==='object'?(nat.ko||nat.en):nat;
}

function _applyTagFocus(){
  if(_tagFilter.type==='nation'){
    const natKo=_tagFilter.value;
    ARTISTS.forEach(a=>{a._focusTarget=_getNatKo(a.nat)===natKo?1:FOCUS_DIM;});
    bubbleMeshes.forEach(({mesh,ko})=>{
      const has=ARTISTS.some(a=>a.group.ko===ko&&_getNatKo(a.nat)===natKo);
      mesh._focusTarget=has?1:FOCUS_DIM;
    });
  } else if(_tagFilter.type==='birthYear'){
    const yr=parseInt(_tagFilter.value);
    ARTISTS.forEach(a=>{a._focusTarget=(a._bdayYear===yr)?1:FOCUS_DIM;});
    bubbleMeshes.forEach(({mesh,ko})=>{
      const has=ARTISTS.some(a=>a.group.ko===ko&&a._bdayYear===yr);
      mesh._focusTarget=has?1:FOCUS_DIM;
    });
  } else if(_tagFilter.type==='debutYear'){
    const yr=_tagFilter.value;
    bubbleMeshes.forEach(({mesh,info})=>{
      mesh._focusTarget=String(info.debut||'').startsWith(yr)?1:FOCUS_DIM;
    });
    ARTISTS.forEach(a=>{
      const bm=bubbleMeshes.find(b=>b.ko===a.group.ko);
      a._focusTarget=bm?bm.mesh._focusTarget:FOCUS_DIM;
    });
  } else if(_tagFilter.type==='agency'){
    const ag=_tagFilter.value;
    bubbleMeshes.forEach(({mesh,info})=>{
      mesh._focusTarget=(info.co||'')===ag?1:FOCUS_DIM;
    });
    ARTISTS.forEach(a=>{
      const bm=bubbleMeshes.find(b=>b.ko===a.group.ko);
      a._focusTarget=bm?bm.mesh._focusTarget:FOCUS_DIM;
    });
  } else if(_connAnchor){
    _applyConnFocus();
  } else if(!focusGroupKo){
    clearFocus();
  }
}

function applyTagFilter(type,value){
  if(_tagFilter.type===type&&_tagFilter.value===value){clearTagFilter();return;}
  _tagFilter={type,value};
  _refreshTagChips();
  _renderFilterPanel();
  _applyTagFocus();
}

function clearTagFilter(){
  _tagFilter={type:null,value:null};
  _refreshTagChips();
  const fp=document.getElementById('filter-panel');if(fp)fp.style.display='none';
  const jh=document.getElementById('journal-hd');if(jh)jh.style.display='';
  document.getElementById('journal-sidebar').classList.remove('open');
  if(_connAnchor){_applyConnFocus();}
  else if(focusGroupKo){setFocus(focusGroupKo,[..._extraFocusKos]);}
  else{clearFocus();}
}

      byMonth[mo].push({m,dd});

(function(){
  const track=document.getElementById('zoom-track');
  const thumb=document.getElementById('zoom-thumb');
  if(!track||!thumb)return;
  let dragging=false,dragStartY=0,dragStartTop=0;

  function getFrac(){
    const dist=camera.position.distanceTo(controls.target);
    return Math.min(1,Math.max(0,(dist-controls.minDistance)/(controls.maxDistance-controls.minDistance)));
  }
  function setFrac(frac){
    const dist=controls.minDistance+frac*(controls.maxDistance-controls.minDistance);
    const dir=camera.position.clone().sub(controls.target);
    if(dir.lengthSq()<0.0001)dir.set(0,0,1);
    camera.position.copy(controls.target).addScaledVector(dir.normalize(),dist);
    controls.update();
  }
  window._syncZoomSlider=function(){
    if(dragging)return;
    const trackH=track.clientHeight,thumbH=thumb.offsetHeight;
    if(!trackH)return;
    thumb.style.top=(getFrac()*(trackH-thumbH))+'px';
  };
  thumb.addEventListener('mousedown',e=>{
    e.preventDefault();e.stopPropagation();
    dragging=true;dragStartY=e.clientY;
    dragStartTop=parseFloat(thumb.style.top)||0;
    thumb.style.transition='none';
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const trackH=track.clientHeight,thumbH=thumb.offsetHeight,maxTop=trackH-thumbH;
    const newTop=Math.max(0,Math.min(maxTop,dragStartTop+(e.clientY-dragStartY)));
    thumb.style.top=newTop+'px';
    setFrac(maxTop>0?newTop/maxTop:0);
  });
  window.addEventListener('mouseup',()=>{
    if(dragging){dragging=false;thumb.style.transition='';}
  });
  track.addEventListener('click',e=>{
    if(e.target===thumb)return;
    const rect=track.getBoundingClientRect(),thumbH=thumb.offsetHeight;
    const trackH=track.clientHeight,maxTop=trackH-thumbH;
    const newTop=Math.max(0,Math.min(maxTop,e.clientY-rect.top-thumbH/2));
    thumb.style.top=newTop+'px';
    setFrac(maxTop>0?newTop/maxTop:0);
  });
  document.getElementById('zoom-overview-btn').addEventListener('click',e=>{
    e.stopPropagation();
    const tgt=controls.target.clone();
    const dir=camera.position.clone().sub(tgt);
    if(dir.lengthSq()<0.001)dir.set(0,0,1);
    const maxPos=tgt.clone().addScaledVector(dir.normalize(),controls.maxDistance);
    _startFly(tgt,maxPos,800);
    flyState.onComplete=()=>{controls.autoRotate=true;};
  });
})();

const _tipEl=document.getElementById('member-tooltip');
let _tipRaf=null;
const _tipMouse=new THREE.Vector2();
window.addEventListener('mousemove',e=>{
  if(isMob())return;
  if(_tipRaf)cancelAnimationFrame(_tipRaf);
  _tipRaf=requestAnimationFrame(()=>{
    const rect=renderer.domElement.getBoundingClientRect();
    if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom){
      _tipEl.style.opacity='0';return;
    }
    const _overPanel=document.elementsFromPoint(e.clientX,e.clientY).some(el=>el.closest('#tt,#gc,#side-panel,#member-panel,#journal-sidebar,#desktop-header,#settings-panel,#search-wrap,#conn-panel,#yt-lightbox'));
    if(_overPanel){_tipEl.style.opacity='0';return;}
    // 1. 멤버 별 이름 — 행성이 충분히 가까울 때만
    let nearArtist=null,nearPx=Infinity;
    ARTISTS.forEach(a=>{
      _artistGroups(a).forEach(g=>{
        const wp=(a._worldPositions||[]).find(w=>w.groupKo===g.ko);
        const pos=wp?wp.pos:a._worldPos;
        if(!pos)return;
        const bm=bubbleMeshes.find(b=>b.ko===g.ko);
        if(bm&&camera.position.distanceTo(bm.mesh.position)>65)return;
        const p=pos.clone().project(camera);
        if(p.z>1)return;
        const sx=(p.x+1)*0.5*rect.width+rect.left;
        const sy=(-p.y+1)*0.5*rect.height+rect.top;
        const d=Math.hypot(sx-e.clientX,sy-e.clientY);
        if(d<nearPx){nearPx=d;nearArtist=a;}
      });
    });
    if(nearArtist&&nearPx<14){
      _tipEl.textContent=currentLang==='ko'?nearArtist.name.ko:(nearArtist.name.en||nearArtist.name.ko);
      _tipEl.style.left=e.clientX+'px';_tipEl.style.top=e.clientY+'px';
      _tipEl.style.opacity='1';return;
    }
    // 2. 그룹 행성 이름 — 그룹 레이블이 아직 잘 안 보일 때
    _tipMouse.x=((e.clientX-rect.left)/rect.width)*2-1;
    _tipMouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
    raycaster.setFromCamera(_tipMouse,camera);
    const bHits=raycaster.intersectObjects(bubbleMeshes.map(b=>b.mesh));
    if(bHits.length){
      const bm=bubbleMeshes.find(b=>b.mesh===bHits[0].object);
      if(bm&&camera.position.distanceTo(bm.mesh.position)>50){
        _tipEl.textContent=currentLang==='ko'?bm.ko:(bm.info.en||bm.ko);
        _tipEl.style.left=e.clientX+'px';_tipEl.style.top=e.clientY+'px';
        _tipEl.style.opacity='1';return;
      }
    }
    _tipEl.style.opacity='0';
  });
});

// ── 모바일: touchend로 멤버 점 직접 감지 (OrbitControls click 억제 우회) ──
let _mobTapSX=0,_mobTapSY=0;
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length!==1)return;
  _mobTapSX=e.touches[0].clientX;_mobTapSY=e.touches[0].clientY;
},{passive:true});
renderer.domElement.addEventListener('touchend',e=>{
  if(!isMob()||e.changedTouches.length!==1)return;
  const t=e.changedTouches[0];
  if(Math.hypot(t.clientX-_mobTapSX,t.clientY-_mobTapSY)>15)return;
  const rect=renderer.domElement.getBoundingClientRect();
  const cx=t.clientX,cy=t.clientY;
  if(cx<rect.left||cx>rect.right||cy<rect.top||cy>rect.bottom)return;
  // 레이캐스터로 행성 hit 여부 먼저 확인 (줌 상태 판단)
  const _m2=new THREE.Vector2();
  _m2.x=((cx-rect.left)/rect.width)*2-1;
  _m2.y=-((cy-rect.top+_mobViewShift)/rect.height)*2+1;
  raycaster.setFromCamera(_m2,camera);
  const _bh=raycaster.intersectObjects(bubbleMeshes.map(b=>b.mesh));
  const _hitPlanet=_bh.length?bubbleMeshes.find(b=>b.mesh===_bh[0].object):null;
  // 행성이 불투명(줌아웃) 상태면 멤버 클릭 비활성화 → 그룹 카드만 열림
  const _inPlanetMode=_hitPlanet&&_hitPlanet.mesh.material.uniforms.uFillOp.value>0.12&&![focusGroupKo,..._extraFocusKos].includes(_hitPlanet.ko);
  if(!_inPlanetMode){
    // 가까이 줌인된 투명 행성 or 행성 밖 → 멤버 점 체크
    let nearArtist=null,nearPx=Infinity;
    ARTISTS.forEach(a=>{
      const _wps=a._worldPositions||[];
      const _chk=_wps.length?_wps.map(wp=>wp.pos):(a._worldPos?[a._worldPos]:[]);
      _chk.forEach(pos=>{
        const p=pos.clone().project(camera);
        if(p.z>1)return;
        const sx=(p.x+1)*0.5*rect.width+rect.left;
        const sy=(-p.y+1)*0.5*rect.height+rect.top;
        const d=Math.hypot(sx-cx,sy-cy);
        if(d<nearPx){nearPx=d;nearArtist=a;}
      });
    });
    if(nearArtist&&nearPx<25){
      e.preventDefault();
      const gcInSide=!isMob()&&sidePanelEl.classList.contains('open')&&document.getElementById('gc').parentElement===sidePanelEl;
      if(gcInSide){closeMemberPanel(false);}else{closeCards();}
      showT(nearArtist,cx,cy);
      pulseMember(nearArtist);
      return;
    }
  }
  if(!_bh.length){
    // 빈 우주 공간 → 포커스 해제 + 카드 닫기
    e.preventDefault();
    closeCards();
  }else if(_hitPlanet){
    // 행성 버블 hit → 그룹 카드 직접 열기 (controls.enabled=true 상태에선 synthetic click 억제되므로 여기서 처리)
    e.preventDefault();
    flyToBubble(_hitPlanet.mesh.position,_hitPlanet.radius);
    closeCards();
    showGC(_hitPlanet.ko,cx,cy);
  }
},{passive:false});

window.addEventListener('click',e=>{
  if(Math.hypot(e.clientX-_mdx,e.clientY-_mdy)>(isMob()?12:5))return;
  const rect=renderer.domElement.getBoundingClientRect();
  if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom)return;
  _mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  _mouse.y=-((e.clientY-rect.top+_mobViewShift)/rect.height)*2+1;
  raycaster.setFromCamera(_mouse,camera);

  function nearestMember(){
    let nearArtist=null,nearPx=Infinity;
    ARTISTS.forEach(a=>{
      const _wps=a._worldPositions||[];
      const _chk=_wps.length?_wps.map(wp=>wp.pos):(a._worldPos?[a._worldPos]:[]);
      _chk.forEach(pos=>{
        const p=pos.clone().project(camera);
        if(p.z>1)return;
        const sx=(p.x+1)*0.5*rect.width+rect.left;
        const sy=(-p.y+1)*0.5*rect.height+rect.top;
        const d=Math.hypot(sx-e.clientX,sy-e.clientY);
        if(d<nearPx){nearPx=d;nearArtist=a;}
      });
    });
    return nearPx<(isMob()?40:20)?nearArtist:null;
  }

  const bHits=raycaster.intersectObjects(bubbleMeshes.map(b=>b.mesh));
  if(bHits.length){
    const found=bubbleMeshes.find(b=>b.mesh===bHits[0].object);
    if(found){
      const planetMode=found.mesh.material.uniforms.uFillOp.value>0.12&&![focusGroupKo,..._extraFocusKos].includes(found.ko);
      if(!planetMode){
        // 투명 버블 → 멤버 우선
        const a=nearestMember();
        if(a){
          const gcInSide=!isMob()&&sidePanelEl.classList.contains('open')&&document.getElementById('gc').parentElement===sidePanelEl;
          if(gcInSide){closeMemberPanel(false);}else{closeCards();}
          showT(a,e.clientX,e.clientY);if(!isMob())pulseMember(a);return;
        }
      }
      // 행성 모드 or 멤버 없음 → 그룹 카드
      flyToBubble(found.mesh.position,found.radius);
      const _ttEl2=document.getElementById('tt');
      const _ttInSide2=!isMob()&&sidePanelEl.classList.contains('open')&&_ttEl2.parentElement===sidePanelEl;
      if(_ttInSide2){
        const _cWas2=connPanelEl.classList.contains('open');
        const _cAnc2=_connAnchor;
        if(_cWas2)closeConnCard();
        showGC(found.ko,e.clientX,e.clientY);
        openMemberPanel(_ttEl2);
        if(_cWas2&&_cAnc2)openConnCard(_cAnc2);
      }else{
        closeCards();
        showGC(found.ko,e.clientX,e.clientY);
      }
      return;
    }
  }

  // 버블 밖 → 멤버만 체크
  const a=nearestMember();
  if(a){
    const gcInSide=!isMob()&&sidePanelEl.classList.contains('open')&&document.getElementById('gc').parentElement===sidePanelEl;
    if(gcInSide){closeMemberPanel(false);}else{closeCards();}
    showT(a,e.clientX,e.clientY);if(!isMob())pulseMember(a);return;
  }
  closeCards();
});

function _daysUntilBday(bdayStr){
  if(!bdayStr)return null;
  const p=bdayStr.split('.');
  if(p.length<3)return null;
  const bm=parseInt(p[1]),bd=parseInt(p[2]);
  if(!bm||!bd)return null;
  const now=new Date();
  const today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  let next=new Date(today.getFullYear(),bm-1,bd);
  if(next<today)next=new Date(today.getFullYear()+1,bm-1,bd);
  return Math.round((next-today)/(864e5));
}
function _buildBdayList(){
  const el=document.getElementById('bday-list');if(!el)return;
  const MO_KO=['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const MO_EN=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const items=[];
  [...favMembers].forEach(key=>{
    const ci=key.indexOf(':');
    const gko=key.slice(0,ci),mko=key.slice(ci+1);
    const a=ARTISTS.find(x=>x.group.ko===gko&&x.name.ko===mko);
    if(!a||!a.bday)return;
    const d=_daysUntilBday(a.bday);
    if(d===null)return;
    items.push({a,gko,mko,d});
  });
  if(!items.length){el.innerHTML='<div class="fav-empty">즐겨찾기한 멤버가 없어요</div>';return;}
  items.sort((a,b)=>a.d-b.d);
  el.innerHTML='';
  items.forEach(({a,gko,mko,d})=>{
    const parts=a.bday.split('.');
    const bm=parseInt(parts[1]),bd=parseInt(parts[2]);
    const dateStr=currentLang==='ko'?`${MO_KO[bm]} ${bd}일`:`${MO_EN[bm]} ${bd}`;
    const badgeCls=d===0?'today':d<=14?'soon':'normal';
    const badgeTxt=d===0?'🎂 오늘':`D-${d}`;
    const name=currentLang==='ko'?mko:(a.name.en||mko);
    const div=document.createElement('div');div.className='bday-item';
    div.innerHTML=`<span class="bday-badge ${badgeCls}">${badgeTxt}</span><span class="bday-name">${name}</span><span class="bday-date">${dateStr}</span>`;
    div.addEventListener('click',()=>{
      const bm2=bubbleMeshes.find(b=>b.ko===gko);
      if(bm2)flyToBubble(bm2.mesh.position,bm2.radius);
      showT(a,window.innerWidth/2,window.innerHeight*0.4);
      pulseMember(a);
    });
    el.appendChild(div);
  });
}

  ARTISTS.forEach(a=>{
    const on=favMembers.has(_mFavKey(a))||favGroups.has(a.group.ko);
    a._focusTarget=on?1:FOCUS_DIM;

  // NCT rings: dim unless that NCT planet is favorited
