const PROFILE_KEY='kpu_profile';
const STAR_COLORS=[
  [155,210,255],[182,150,255],[255,138,175],[138,255,212],
  [255,218,112],[226,232,255],[255,160,128],[208,122,255]
];
let myProfile=JSON.parse(localStorage.getItem(PROFILE_KEY)||'null');
let _ppSelectedColor=myProfile?.color||STAR_COLORS[0];

function _makeMyStarTex([r,g,b]){
  const sz=128,c=sz/2;
  const cv=document.createElement('canvas');cv.width=cv.height=sz;
  const ctx=cv.getContext('2d');
  const grd=ctx.createRadialGradient(c,c,0,c,c,c*0.88);
  grd.addColorStop(0,`rgba(${r},${g},${b},1)`);
  grd.addColorStop(0.10,`rgba(${r},${g},${b},0.92)`);
  grd.addColorStop(0.28,`rgba(${r},${g},${b},0.48)`);
  grd.addColorStop(0.55,`rgba(${r},${g},${b},0.11)`);
  grd.addColorStop(0.82,`rgba(${r},${g},${b},0.02)`);
  grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
  ctx.fillStyle=grd;ctx.fillRect(0,0,sz,sz);
  const core=ctx.createRadialGradient(c,c,0,c,c,sz*0.065);
  core.addColorStop(0,'rgba(255,255,255,1)');
  core.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=core;ctx.fillRect(0,0,sz,sz);
  return new THREE.CanvasTexture(cv);
}

function _getMyStarPos(){
  const list=[...favGroups];
  if(!list.length)return new THREE.Vector3(0,12,0);
  const c=new THREE.Vector3();let n=0;
  list.forEach(ko=>{const bm=bubbleMeshes.find(b=>b.ko===ko);if(bm){c.add(bm.mesh.position);n++;}});
  if(n)c.divideScalar(n);
  c.y+=7;
  return c;
}

function _clearMyStarLines(){
  _myStarLines.forEach(l=>{scene.remove(l);l.geometry.dispose();l.material.dispose();});
  _myStarLines=[];
}
function _clearMemberCardLines(){
  _memberCardLines.forEach(l=>{scene.remove(l);l.geometry.dispose();l.material.dispose();});
  _memberCardLines=[];
}

function _updateMyStarLines(){
  _clearMyStarLines();
  if(!favMode||!myStarSprite)return;
  const col=myProfile?.color||STAR_COLORS[0];
  const c=new THREE.Color(col[0]/255,col[1]/255,col[2]/255).multiplyScalar(1.5);
  const from=myStarSprite.position;

  // 멤버 → 실선
  [...favMembers].forEach(key=>{
    const ci=key.indexOf(':');
    const artist=ARTISTS.find(a=>a.group.ko===key.slice(0,ci)&&a.name.ko===key.slice(ci+1));
    if(!artist?._worldPos)return;
    const geo=new THREE.BufferGeometry().setFromPoints([from.clone(),artist._worldPos.clone()]);
    const mat=new THREE.LineBasicMaterial({color:c,transparent:true,opacity:0.55,depthWrite:false});
    const line=new THREE.Line(geo,mat);scene.add(line);_myStarLines.push(line);
  });

  // 그룹 → 파선
  [...favGroups].forEach(ko=>{
    const bm=bubbleMeshes.find(b=>b.ko===ko);
    if(!bm)return;
    const geo=new THREE.BufferGeometry().setFromPoints([from.clone(),bm.mesh.position.clone()]);
    const mat=new THREE.LineDashedMaterial({color:c,transparent:true,opacity:0.28,dashSize:2.2,gapSize:1.4,depthWrite:false});
    const line=new THREE.Line(geo,mat);line.computeLineDistances();
    scene.add(line);_myStarLines.push(line);
  });
}

function placeMyStarInUniverse(){
  if(myStarSprite){scene.remove(myStarSprite);if(myStarTex)myStarTex.dispose();myStarSprite=null;myStarTex=null;myStarLabel=null;}
  if(!myProfile?.nickname)return;
  const color=myProfile.color||STAR_COLORS[0];
  const[r,g,b]=color;
  myStarTex=_makeMyStarTex(color);
  const mat=new THREE.SpriteMaterial({map:myStarTex,transparent:true,opacity:0.88,blending:THREE.AdditiveBlending,depthTest:false});
  myStarSprite=new THREE.Sprite(mat);
  myStarSprite.position.copy(_getMyStarPos());
  myStarSprite.scale.setScalar(myStarBase);
  const div=document.createElement('div');
  div.className='group-label';
  div.textContent=myProfile.nickname;
  div.style.color=`rgb(${Math.min(255,r*2.2|0)},${Math.min(255,g*2.2|0)},${Math.min(255,b*2.4|0)})`;
  div.style.fontSize='11px';
  div.style.cursor='pointer';
  div.addEventListener('click',e=>{e.stopPropagation();_toggleMyStarFocus();});
  myStarLabel=new THREE.CSS2DObject(div);
  myStarLabel.position.set(0,myStarBase*0.75,0);
  myStarSprite.add(myStarLabel);
  scene.add(myStarSprite);
  if(favMode)_updateMyStarLines();
}

function _randomStarColor(){
  const h=(Math.random()*360)|0,s=65+Math.random()*25,l=62+Math.random()*18;
  const a=s/100,b=l/100;
  const f=n=>{const k=(n+h/30)%12,c=a*Math.min(b,1-b);return Math.round((b-c*Math.max(-1,Math.min(k-3,9-k,1)))*255);};
  return[f(0),f(8),f(4)];
}

function _isPresetColor(col){
  return STAR_COLORS.some(([r,g,b])=>r===col[0]&&g===col[1]&&b===col[2]);
}

function _buildColorSwatches(){
  const cont=document.getElementById('pp-colors');cont.innerHTML='';
  STAR_COLORS.forEach(([r,g,b],i)=>{
    const sw=document.createElement('button');
    const sel=_ppSelectedColor[0]===r&&_ppSelectedColor[1]===g&&_ppSelectedColor[2]===b;
    sw.className='pp-color-swatch'+(sel?' sel':'');
    sw.style.cssText=`background:rgb(${r},${g},${b});box-shadow:0 0 7px rgba(${r},${g},${b},0.55)`;
    sw.addEventListener('click',e=>{
      e.stopPropagation();_ppSelectedColor=[r,g,b];
      cont.querySelectorAll('.pp-color-swatch').forEach((s,j)=>s.classList.toggle('sel',j===i));
    });
    cont.appendChild(sw);
  });
  const randSel=!_isPresetColor(_ppSelectedColor);
  const rw=document.createElement('button');
  rw.className='pp-color-swatch pp-color-rand'+(randSel?' sel':'');
  rw.title='랜덤';
  rw.addEventListener('click',e=>{
    e.stopPropagation();
    _ppSelectedColor=_randomStarColor();
    cont.querySelectorAll('.pp-color-swatch').forEach(s=>s.classList.remove('sel'));
    rw.classList.add('sel');
  });
  cont.appendChild(rw);
}

  const nickEl=document.getElementById('my-page-nick');
  const bioEl=document.getElementById('my-page-bio');
  if(dot){
    if(myProfile?.color){
      const[r,g,b]=myProfile.color;
      dot.style.background=`rgb(${r},${g},${b})`;
      dot.style.boxShadow=`0 0 9px rgba(${r},${g},${b},0.55)`;
    }else{
      dot.style.background='rgba(140,160,210,0.20)';
      dot.style.boxShadow='none';
    }
  }
  if(nickEl){
    nickEl.textContent=nick||'–';
    nickEl.style.color='';
    nickEl.classList.remove('my-star-sel');
    nickEl.onclick=e=>{e.stopPropagation();_toggleMyStarFocus();};
  }
  if(bioEl)bioEl.textContent=myProfile?.bio||'';
  _myStarSelected=false;
}

function saveProfile(){
  const nick=document.getElementById('pp-nick').value.trim();
  const errEl=document.getElementById('pp-nick-err');
  if(!nick){errEl.style.display='block';document.getElementById('pp-nick').focus();return;}
  errEl.style.display='none';
  myProfile={
    nickname:nick,
    bio:document.getElementById('pp-bio').value.trim(),
    color:_ppSelectedColor,
    favPublic:document.getElementById('pp-fav-pub').checked
  };
  localStorage.setItem(PROFILE_KEY,JSON.stringify(myProfile));
  closeProfilePanel();
  _updateProfileBtns();
  updateMyPage();
  const _wasSel=_myStarSelected;
  _myStarSelected=false;
  placeMyStarInUniverse();
  if(_wasSel)_toggleMyStarFocus();
}

document.getElementById('pp-save').addEventListener('click',e=>{e.stopPropagation();saveProfile();});
document.getElementById('pp-close').addEventListener('click',e=>{e.stopPropagation();closeProfilePanel();});
document.getElementById('profile-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeProfilePanel();});
document.getElementById('profile-overlay').addEventListener('pointerdown',e=>e.stopPropagation());
['pp-nick','pp-bio'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')saveProfile();}));
document.getElementById('tab-profile').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('journal-sidebar').classList.toggle('open');
});
document.getElementById('dh-profile-btn').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('journal-sidebar').classList.toggle('open');
});
document.getElementById('my-page-edit').addEventListener('click',e=>{e.stopPropagation();openProfilePanel();});
_updateProfileBtns();
updateMyPage();

// ── Journal sidebar ───────────────────────────────
document.getElementById('journal-toggle').addEventListener('click',e=>{
  e.stopPropagation();
  document.getElementById('journal-sidebar').classList.toggle('open');
});
document.getElementById('filter-panel-clear').addEventListener('click',e=>{e.stopPropagation();clearTagFilter();});
document.getElementById('journal-sidebar').addEventListener('click',e=>e.stopPropagation());
document.getElementById('journal-sidebar').addEventListener('pointerdown',e=>e.stopPropagation());

buildUniverse().catch(err=>{
  document.getElementById('loading').textContent='Error: '+err.message;
  console.error(err);
});
</script>
</body>
</html>
