<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-pop Universe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0a0a1a;overflow:hidden;transition:background 0.9s ease;}
  body.day{
    background:linear-gradient(180deg,
      #a8c4d8 0%,
      #b8d0e2 18%,
      #ccdeed 36%,
      #dde8ee 52%,
      #e8ddc8 68%,
      #deccaa 82%,
      #d0bc98 100%
    );
  }
  canvas{display:block;}
  #loading{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#8899ff;font-family:'Apple SD Gothic Neo',sans-serif;
    font-size:13px;letter-spacing:0.12em;opacity:0.85;
  }
  #day-btn{
    position:fixed;top:16px;right:16px;
    background:none;border:1px solid rgba(200,184,160,0.3);
    color:rgba(200,184,160,0.55);
    font-family:'Apple SD Gothic Neo',Helvetica,sans-serif;
    font-size:10px;letter-spacing:0.28em;padding:5px 13px;
    cursor:pointer;z-index:10;transition:all 0.5s ease;
  }
  #day-btn:hover{border-color:rgba(200,184,160,0.65);color:rgba(200,184,160,0.9);}
  body.day #day-btn{border-color:rgba(255,245,220,0.5);color:rgba(255,245,220,0.8);}
  body.day #day-btn:hover{border-color:rgba(255,245,220,0.9);color:rgba(255,245,220,1);}
</style>
</head>
<body>
<div id="loading">Loading universe…</div>
<button id="day-btn">— DAY</button>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const W=window.innerWidth,H=window.innerHeight;

// ── Scene ─────────────────────────────────────────
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a1a);

const camera=new THREE.PerspectiveCamera(60,W/H,0.1,1000);
camera.position.set(0,8,68);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.06;
controls.minDistance=5;
controls.maxDistance=150;
controls.autoRotate=true;
controls.autoRotateSpeed=0.25;

// ── Stars ─────────────────────────────────────────
function makeStarField(count,size,opacity){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    pos[i*3  ]=(Math.random()-.5)*400;
    pos[i*3+1]=(Math.random()-.5)*400;
    pos[i*3+2]=(Math.random()-.5)*400;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({
    color:0xffffff,size,sizeAttenuation:true,transparent:true,opacity
  }));
}
const starGroup=new THREE.Group();
starGroup.add(makeStarField(420,0.2,0.6));   // 잔별
starGroup.add(makeStarField(70,0.55,0.85));  // 중간별
starGroup.add(makeStarField(15,1.1,1.0));    // 밝은별
scene.add(starGroup);
// 기존 코드와 호환되도록 alias
const starPoints=starGroup;

// ── Lights ────────────────────────────────────────
const ambLight=new THREE.AmbientLight(0x8877aa,0.3);
scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0xc8b8a0,0.4);
dirLight.position.set(3,2,-1);
scene.add(dirLight);

// ── Glow texture ──────────────────────────────────
function makeGlowTex(){
  const c=document.createElement('canvas');c.width=64;c.height=64;
  const cx=c.getContext('2d');
  // 1) 넓은 소프트 헤일로
  const halo=cx.createRadialGradient(32,32,0,32,32,32);
  halo.addColorStop(0,'rgba(255,255,255,0.75)');
  halo.addColorStop(0.35,'rgba(255,255,255,0.28)');
  halo.addColorStop(0.7,'rgba(255,255,255,0.07)');
  halo.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=halo;cx.fillRect(0,0,64,64);
  // 2) 작고 밝은 코어 (반지름 7px) 위에 덧그리기
  const core=cx.createRadialGradient(32,32,0,32,32,7);
  core.addColorStop(0,'rgba(255,255,255,1)');
  core.addColorStop(0.5,'rgba(255,255,255,0.9)');
  core.addColorStop(1,'rgba(255,255,255,0)');
  cx.fillStyle=core;cx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(c);
}
const glowTex=makeGlowTex();

// Mix rgb with grayscale 30:70
function duneColor(r,g,b){
  const gr=r*0.299+g*0.587+b*0.114;
  return new THREE.Color(
    (r*0.3+gr*0.7)/255,
    (g*0.3+gr*0.7)/255,
    (b*0.3+gr*0.7)/255
  );
}

const bubbleMats=[];

// ── Agency direction ──────────────────────────────
function agencyDir(co){
  const c=(co||'').toUpperCase();
  if(c.includes('SM'))  return new THREE.Vector3(1,0,0);
  if(c.includes('JYP')) return new THREE.Vector3(-1,0,0);
  if(c.includes('HYBE'))return new THREE.Vector3(0,-1,0);
  return new THREE.Vector3(0,0,1);
}

function coneSpread(co){
  const c=(co||'').toUpperCase();
  if(c.includes('SM')||c.includes('JYP'))return Math.PI*0.4;
  if(c.includes('HYBE'))return Math.PI*0.42;
  return Math.PI*0.52;
}

function randomInCone(dir,halfAngle){
  const cosA=Math.cos(halfAngle);
  const cosT=cosA+(1-cosA)*Math.random();
  const sinT=Math.sqrt(1-cosT*cosT);
  const phi=Math.random()*Math.PI*2;
  const v=new THREE.Vector3(sinT*Math.cos(phi),sinT*Math.sin(phi),cosT);
  const q=new THREE.Quaternion().setFromUnitVectors(
    new THREE.Vector3(0,0,1),dir.clone().normalize()
  );
  return v.applyQuaternion(q);
}

function isLegacy(debut){
  return debut&&parseInt(debut)<=2018;
}

// ── Build universe ────────────────────────────────
async function buildUniverse(){
  const [grpData,artData]=await Promise.all([
    fetch('groups.json').then(r=>r.json()),
    fetch('artists.json').then(r=>r.json())
  ]);
  document.getElementById('loading').style.display='none';

  const memberMap={};
  artData.forEach(a=>{
    const k=a.group.ko;
    if(!memberMap[k])memberMap[k]=[];
    memberMap[k].push(a);
  });

  Object.entries(grpData).forEach(([ko,info])=>{
    const members=memberMap[ko]||[];
    const legacy=isLegacy(info.debut);
    const baseDist=legacy?40:20;
    const dist=baseDist+(Math.random()-.5)*8;

    const dir=agencyDir(info.co);
    const pos=randomInCone(dir,coneSpread(info.co)).multiplyScalar(dist);

    const [r,g,b]=info.color||[180,180,200];
    const color=duneColor(r,g,b);
    const radius=Math.min(4,Math.max(2,1.8+members.length*0.25));

    // ── Bubble fill — Fresnel ShaderMaterial ──────
    const fillGeo=new THREE.SphereGeometry(radius,32,32);
    const fillMat=new THREE.ShaderMaterial({
      uniforms:{
        uColor:{value:color},
        uFresnelMult:{value:0.15},
        uBaseOp:{value:0.0}
      },
      vertexShader:`
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main(){
          vNormal=normalize(normalMatrix*normal);
          vec4 mvPos=modelViewMatrix*vec4(position,1.0);
          vViewDir=normalize(-mvPos.xyz);
          gl_Position=projectionMatrix*mvPos;
        }`,
      fragmentShader:`
        uniform vec3 uColor;
        uniform float uFresnelMult;
        uniform float uBaseOp;
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main(){
          vec3 n=gl_FrontFacing?normalize(vNormal):-normalize(vNormal);
          float d=max(0.0,dot(n,normalize(vViewDir)));
          float fresnel=pow(1.0-d,1.8);
          gl_FragColor=vec4(uColor,fresnel*uFresnelMult+uBaseOp);
        }`,
      transparent:true,side:THREE.DoubleSide,depthWrite:false
    });
    bubbleMats.push(fillMat);
    const bubble=new THREE.Mesh(fillGeo,fillMat);
    bubble.position.copy(pos);
    scene.add(bubble);


    // ── Member glows ──────────────────────────────
    members.forEach(m=>{
      const [mr,mg,mb]=m.color||[r,g,b];
      const mColor=duneColor(mr,mg,mb);

      const phi2=Math.acos(2*Math.random()-1);
      const theta=Math.random()*Math.PI*2;
      const rr=Math.cbrt(Math.random())*radius*0.72;
      const mPos=pos.clone().add(new THREE.Vector3(
        rr*Math.sin(phi2)*Math.cos(theta),
        rr*Math.sin(phi2)*Math.sin(theta),
        rr*Math.cos(phi2)
      ));

      const size=m.sparkle?8.0:3.5;
      const op=m.sparkle?0.8:0.4;
      const spColor=m.sparkle?mColor.clone().lerp(new THREE.Color(1,1,1),0.25):mColor;
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({
        map:glowTex,color:spColor,transparent:true,
        depthWrite:false,blending:THREE.AdditiveBlending,opacity:op
      }));
      sp.scale.set(size,size,1);
      sp.position.copy(mPos);
      scene.add(sp);
    });
  });
}

// ── Day / Night toggle ────────────────────────────
let dayMode=false;
function toggleDay(){
  dayMode=!dayMode;
  if(dayMode){
    // 캔버스 투명화 → CSS 그라데이션 노출
    scene.background=null;
    renderer.setClearColor(0x000000,0);
    document.body.classList.add('day');
    // 가을 오후 햇빛: 황금빛 디렉셔널
    ambLight.color.set(0x6090c0);ambLight.intensity=0.65;
    dirLight.color.set(0xffd070);dirLight.intensity=0.9;
    dirLight.position.set(5,3,2);
    // 원거리 버블을 따뜻한 안개로 감싸기
    scene.fog=new THREE.Fog(0xddd0b8,55,200);
    starPoints.visible=false;
  }else{
    scene.background=new THREE.Color(0x0a0a1a);
    renderer.setClearColor(0x0a0a1a,1);
    document.body.classList.remove('day');
    ambLight.color.set(0x8877aa);ambLight.intensity=0.3;
    dirLight.color.set(0xc8b8a0);dirLight.intensity=0.4;
    dirLight.position.set(3,2,-1);
    scene.fog=null;
    starPoints.visible=true;
  }
  bubbleMats.forEach(m=>{
    m.uniforms.uFresnelMult.value=dayMode?0.22:0.15;
    m.uniforms.uBaseOp.value=dayMode?0.06:0.0;
  });
  const btn=document.getElementById('day-btn');
  btn.textContent=dayMode?'— NIGHT':'— DAY';
  // button inline style 초기화 (CSS class가 담당)
  btn.style.borderColor='';btn.style.color='';
}
document.getElementById('day-btn').addEventListener('click',toggleDay);

// ── Animate ───────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});

buildUniverse().catch(err=>{
  document.getElementById('loading').textContent='Error: '+err.message;
  console.error(err);
});
</script>
</body>
</html>
