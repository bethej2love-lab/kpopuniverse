<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-pop Universe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:radial-gradient(ellipse at 50% 38%,
      #12112a 0%,
      #0d0c20 30%,
      #09091a 60%,
      #060612 100%
    );
    overflow:hidden;transition:background 0.9s ease;
  }
  body.day{
    background:linear-gradient(180deg,
      #a8c4d8 0%,
      #b8d0e2 18%,
      #ccdeed 36%,
      #dde8ee 52%,
      #e8ddc8 68%,
      #deccaa 82%,
      #d0bc98 100%
    );
  }
  canvas{display:block;}
  #loading{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    color:#8899ff;font-family:'Apple SD Gothic Neo',sans-serif;
    font-size:13px;letter-spacing:0.12em;opacity:0.85;
  }
  /* ── Mobile title ──────────────────────────────── */
  #mobile-title{
    display:none;position:fixed;top:18px;left:50%;transform:translateX(-50%);
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    font-size:10px;font-weight:700;letter-spacing:.35em;
    color:rgba(170,180,220,0.6);z-index:10;pointer-events:none;
  }
  body.day #mobile-title{color:rgba(80,70,55,0.5);}
  @media(max-width:768px){#mobile-title{display:block;}}
  /* ── Tab bar ────────────────────────────────────── */
  #tabbar{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:2px;
    background:rgba(14,18,34,0.75);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:0.5px solid rgba(255,255,255,0.10);border-radius:22px;
    padding:4px 6px;z-index:40;
  }
  body.day #tabbar{background:rgba(245,240,230,0.80);border-color:rgba(0,0,0,0.09);}
  .tab-btn{
    background:none;border:none;cursor:pointer;
    color:rgba(150,165,210,0.55);
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    font-size:15px;padding:6px 12px;border-radius:16px;
    transition:background .15s,color .15s;line-height:1;
  }
  .tab-btn:hover{background:rgba(255,255,255,0.09);color:rgba(200,215,255,0.92);}
  .tab-btn.active{background:rgba(255,255,255,0.13);color:rgba(225,232,255,0.98);}
  body.day .tab-btn{color:rgba(90,75,58,0.5);}
  body.day .tab-btn:hover{background:rgba(0,0,0,0.06);color:rgba(55,42,28,0.85);}
  body.day .tab-btn.active{background:rgba(0,0,0,0.09);color:rgba(38,26,14,0.9);}
  #tab-lang{font-size:10px;font-weight:700;letter-spacing:.1em;padding:6px 11px;}
  .tab-sep{width:0.5px;height:14px;background:rgba(255,255,255,0.1);margin:0 1px;flex-shrink:0;}
  body.day .tab-sep{background:rgba(0,0,0,0.1);}
  /* ── Settings panel ─────────────────────────────── */
  #settings-panel{
    position:fixed;bottom:78px;right:16px;width:252px;
    background:rgba(14,18,34,0.90);
    backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
    border:0.5px solid rgba(255,255,255,0.10);border-radius:16px;
    padding:14px 16px 16px;z-index:40;display:none;
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  }
  #settings-panel.open{display:block;}
  body.day #settings-panel{background:rgba(246,241,232,0.93);border-color:rgba(0,0,0,0.09);}
  .sp-hd{font-size:9.5px;font-weight:700;letter-spacing:.2em;color:rgba(130,150,205,0.5);
    text-transform:uppercase;margin-bottom:11px;}
  body.day .sp-hd{color:rgba(140,120,95,0.5);}
  .sp-row{display:flex;align-items:center;justify-content:space-between;
    padding:6px 0;border-bottom:0.5px solid rgba(255,255,255,0.055);}
  .sp-row:last-child{border-bottom:none;padding-top:9px;}
  body.day .sp-row{border-bottom-color:rgba(0,0,0,0.06);}
  .sp-lbl{font-size:10.5px;color:#7090b8;letter-spacing:.02em;}
  body.day .sp-lbl{color:#9a8a78;}
  .sp-tog{
    background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.12);
    color:rgba(130,150,195,0.6);font-size:9px;letter-spacing:.1em;font-weight:700;
    padding:3px 10px;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;
  }
  .sp-tog.on{background:rgba(150,170,255,0.18);border-color:rgba(150,170,255,0.3);
    color:rgba(190,205,255,0.95);}
  body.day .sp-tog{background:rgba(0,0,0,0.06);border-color:rgba(0,0,0,0.1);color:rgba(100,85,68,0.7);}
  body.day .sp-tog.on{background:rgba(70,95,210,0.14);border-color:rgba(70,95,210,0.25);color:rgba(45,65,165,0.9);}
  .sp-sec{padding:7px 0;border-bottom:0.5px solid rgba(255,255,255,0.055);}
  body.day .sp-sec{border-bottom-color:rgba(0,0,0,0.06);}
  .sp-sec-lbl{font-size:10px;color:#7090b8;margin-bottom:5px;}
  body.day .sp-sec-lbl{color:#9a8a78;}
  .sp-dual{position:relative;height:18px;margin-top:6px;}
  .sp-dual::before{content:'';position:absolute;top:50%;left:0;right:0;height:1.5px;
    background:rgba(255,255,255,0.13);transform:translateY(-50%);border-radius:1px;pointer-events:none;}
  body.day .sp-dual::before{background:rgba(0,0,0,0.12);}
  .sp-dual input[type=range]{
    position:absolute;width:100%;height:100%;left:0;top:0;margin:0;padding:0;
    pointer-events:none;-webkit-appearance:none;appearance:none;background:transparent;
  }
  .sp-dual input[type=range]::-webkit-slider-runnable-track{background:transparent;}
  .sp-dual input[type=range]::-moz-range-track{background:transparent;height:0;}
  .sp-dual input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;pointer-events:all;cursor:pointer;
    width:11px;height:11px;border-radius:50%;background:#8899dd;border:none;
  }
  .sp-dual input[type=range]::-moz-range-thumb{
    pointer-events:all;cursor:pointer;
    width:11px;height:11px;border-radius:50%;background:#8899dd;border:none;
  }
  body.day .sp-dual input[type=range]::-webkit-slider-thumb{background:#5566bb;}
  body.day .sp-dual input[type=range]::-moz-range-thumb{background:#5566bb;}
  .sp-rng-vals{display:flex;justify-content:space-between;font-size:8.5px;color:#4a6278;margin-top:2px;}
  body.day .sp-rng-vals{color:#a09080;}
  .sp-types{display:flex;gap:4px;margin-top:5px;}
  .sp-type{
    flex:1;padding:4px 0;font-size:9.5px;letter-spacing:.03em;text-align:center;
    background:rgba(255,255,255,0.04);border:0.5px solid rgba(255,255,255,0.1);
    color:rgba(110,135,185,0.6);border-radius:8px;cursor:pointer;
    font-family:inherit;transition:all .15s;
  }
  .sp-type.active{background:rgba(130,155,255,0.18);border-color:rgba(130,155,255,0.32);
    color:rgba(185,200,255,0.95);}
  body.day .sp-type{background:rgba(0,0,0,0.05);border-color:rgba(0,0,0,0.1);color:rgba(100,85,68,0.65);}
  body.day .sp-type.active{background:rgba(55,80,205,0.13);border-color:rgba(55,80,205,0.22);color:rgba(38,58,162,0.9);}
  .sp-reset{
    width:100%;padding:7px;background:rgba(255,255,255,0.05);
    border:0.5px solid rgba(255,255,255,0.1);border-radius:10px;
    color:rgba(130,148,190,0.65);font-size:10px;letter-spacing:.1em;
    font-family:inherit;cursor:pointer;transition:all .15s;
  }
  .sp-reset:hover{background:rgba(255,255,255,0.09);color:rgba(175,190,235,0.9);}
  body.day .sp-reset{background:rgba(0,0,0,0.04);border-color:rgba(0,0,0,0.1);color:rgba(100,88,72,0.65);}
  body.day .sp-reset:hover{background:rgba(0,0,0,0.08);}
  .group-label{
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    font-size:11px;font-weight:500;letter-spacing:0.1em;
    pointer-events:none;user-select:none;white-space:nowrap;
    text-shadow:0 0 10px currentColor,0 1px 4px rgba(0,0,0,0.85);
    transition:opacity 0.35s ease;
  }
  /* ── Cards ───────────────────────────────────── */
  #tt,#gc{
    background:rgba(16,20,36,0.62);
    backdrop-filter:blur(36px) saturate(180%);
    -webkit-backdrop-filter:blur(36px) saturate(180%);
    border:0.5px solid rgba(255,255,255,0.10);
    border-radius:16px;
    box-shadow:0 1px 0 rgba(255,255,255,0.06) inset,0 8px 32px rgba(0,0,0,0.55);
  }
  body.day #tt,body.day #gc{
    background:rgba(252,249,244,0.52);
    border-color:rgba(255,255,255,0.82);
    box-shadow:0 1.5px 0 rgba(255,255,255,0.95) inset,0 8px 30px rgba(80,58,38,0.13);
  }
  #tt{
    position:fixed;display:none;max-width:210px;
    padding:13px 15px 12px;font-size:12px;line-height:1.55;
    color:#a8b8d2;z-index:30;pointer-events:all;
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
  }
  body.day #tt{color:#4a3c32;}
  #ttx{position:absolute;top:9px;right:11px;font-size:15px;color:rgba(120,140,175,0.45);cursor:pointer;line-height:1;}
  body.day #ttx{color:rgba(158,142,128,0.5);}
  .tn{font-size:14px;font-weight:700;color:#d8e4f6;margin-bottom:3px;padding-right:18px;letter-spacing:-.02em;}
  body.day .tn{color:#241c14;}
  .tg{font-size:10px;color:#8aa4c8;margin-bottom:1px;letter-spacing:.05em;font-weight:500;text-transform:uppercase;cursor:pointer;transition:color .12s;}
  .tg:hover{color:#c0d4f0;}
  body.day .tg{color:#b8a894;}
  body.day .tg:hover{color:#7a6050;}
  .tco{font-size:9px;color:#607898;margin-bottom:6px;}
  body.day .tco{color:#c8b8a8;}
  .tm{font-size:10px;color:#6080a0;margin-bottom:8px;letter-spacing:.01em;}
  body.day .tm{color:#b0a090;}
  #tv-big-wrap{cursor:pointer;border-radius:8px;overflow:hidden;background:rgba(255,255,255,0.04);}
  #tv-big-wrap:hover #tv-big{opacity:.84;}
  #tv-big{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;transition:opacity .13s;}
  #tv-big-title{font-size:8.5px;color:#4a6080;line-height:1.3;padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  body.day #tv-big-title{color:#7a6858;}
  #tv-small-row{display:flex;gap:5px;margin-top:5px;}
  .tv-sm{flex:1;cursor:pointer;border-radius:6px;overflow:hidden;background:rgba(255,255,255,0.04);transition:opacity .13s;}
  .tv-sm:hover{opacity:.82;}
  .tv-sm img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;}
  .tv-sm-title{font-size:8.5px;color:#4a6080;line-height:1.3;padding:3px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tv-empty{font-size:11px;color:#2e3e56;}
  body.day .tv-sm{background:rgba(0,0,0,0.05);}
  body.day .tv-sm-title,body.day #tv-big-title{color:#7a6858;}
  body.day .tv-empty{color:#c8b8a8;}
  #gc{position:fixed;display:none;max-width:234px;z-index:30;overflow:hidden;pointer-events:all;font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    transition:opacity 0.22s ease,transform 0.22s ease;}
  #gc.gc-enter{opacity:0;transform:translateY(6px) scale(0.97);}
  #gc-bar{height:3px;width:100%;}
  #gc-inner{padding:12px 16px 14px;}
  #gcx{position:absolute;top:11px;right:11px;font-size:15px;color:rgba(120,140,175,0.55);cursor:pointer;line-height:1;}
  body.day #gcx{color:rgba(158,142,128,0.5);}
  #gc-name{font-size:15px;font-weight:700;margin-bottom:1px;padding-right:16px;letter-spacing:-.02em;color:#d8e4f6;}
  body.day #gc-name{color:inherit;}
  #gc-en{font-size:9px;letter-spacing:.1em;color:#607898;margin-bottom:10px;text-transform:uppercase;font-weight:500;}
  body.day #gc-en{color:#b8a894;}
  #gc-grid{display:flex;flex-direction:column;gap:5px;margin-top:12px;padding-top:11px;border-top:0.5px solid rgba(255,255,255,0.07);}
  body.day #gc-grid{border-top-color:rgba(150,130,110,0.14);}
  #gc-grid .row{display:flex;align-items:center;}
  #gc-grid .lbl{font-size:9px;color:#7090b8;min-width:56px;flex-shrink:0;letter-spacing:.02em;}
  body.day #gc-grid .lbl{color:#c0b0a0;}
  #gc-grid .val{font-size:10.5px;color:#9aaece;font-weight:500;}
  body.day #gc-grid .val{color:#5a4c3e;}
  #gc-mem-row{align-items:flex-start;}
  .gc-mem-name{cursor:pointer;transition:color .12s;}
  .gc-mem-name:hover{color:#d8eaff;}
  body.day .gc-mem-name:hover{color:#2a1c10;text-decoration:underline;}
  #gc-tv{margin-top:12px;}
  /* ── Search ──────────────────────────────────── */
  #search-wrap{
    position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
    z-index:40;width:240px;
    font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;
    display:none;
  }
  #search-wrap.open{display:block;}
  #search-input{
    width:100%;background:rgba(16,20,36,0.72);
    border:0.5px solid rgba(255,255,255,0.14);border-radius:10px;
    color:#c8d8f0;font-family:inherit;font-size:12px;
    padding:7px 13px;outline:none;letter-spacing:.04em;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    transition:border-color .15s;
  }
  #search-input:focus{border-color:rgba(160,180,255,0.35);}
  #search-input::placeholder{color:rgba(140,160,200,0.35);}
  body.day #search-input{background:rgba(245,240,230,0.82);color:#3a2c20;border-color:rgba(0,0,0,0.1);}
  #search-results{
    display:none;margin-top:4px;
    background:rgba(14,18,34,0.88);
    border:0.5px solid rgba(255,255,255,0.10);border-radius:10px;
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    max-height:220px;overflow-y:auto;
  }
  body.day #search-results{background:rgba(245,240,230,0.92);border-color:rgba(0,0,0,0.09);}
  .sr-item{
    padding:7px 13px;font-size:11px;color:#a8b8d2;cursor:pointer;
    border-bottom:0.5px solid rgba(255,255,255,0.05);letter-spacing:.02em;
    display:flex;justify-content:space-between;align-items:center;
  }
  .sr-item:last-child{border-bottom:none;}
  .sr-item:hover{background:rgba(255,255,255,0.07);}
  body.day .sr-item{color:#4a3c30;border-bottom-color:rgba(0,0,0,0.06);}
  body.day .sr-item:hover{background:rgba(0,0,0,0.05);}
  .sr-tag{font-size:9px;color:#4a6090;letter-spacing:.07em;text-transform:uppercase;flex-shrink:0;margin-left:8px;}
  body.day .sr-tag{color:#a09078;}
</style>
</head>
<body>
<div id="loading">Loading universe…</div>
<div id="mobile-title">K-POP UNIVERSE</div>
<div id="tt"><span id="ttx">×</span><div class="tn" id="tn"></div><div class="tg" id="tg"></div><div class="tco" id="tco"></div><div class="tm" id="tm"></div><div id="tv"></div></div>
<div id="gc">
  <div id="gc-bar"></div>
  <div id="gc-inner">
    <span id="gcx">×</span>
    <div id="gc-name"></div>
    <div id="gc-en"></div>
    <div id="gc-grid">
      <div class="row"><span class="lbl">소속</span><span class="val" id="gc-co"></span></div>
      <div class="row"><span class="lbl">데뷔</span><span class="val" id="gc-debut"></span></div>
      <div class="row" id="gc-mem-row"><span class="lbl">멤버</span><span class="val" id="gc-mem-list"></span></div>
    </div>
    <div id="gc-tv"></div>
  </div>
</div>
<div id="search-wrap">
  <input id="search-input" type="text" placeholder="그룹 · 멤버 검색…" autocomplete="off">
  <div id="search-results"></div>
</div>
<div id="settings-panel">
  <div class="sp-hd">설정</div>
  <div class="sp-row">
    <span class="sp-lbl">DAY / NIGHT</span>
    <button class="sp-tog" id="sp-daynight">NIGHT</button>
  </div>
  <div class="sp-row">
    <span class="sp-lbl">연결선</span>
    <button class="sp-tog on" id="sp-conn">ON</button>
  </div>
  <div class="sp-sec">
    <div class="sp-sec-lbl">데뷔 연도</div>
    <div class="sp-dual">
      <input type="range" id="sp-dlo" min="2000" max="2026" value="2000">
      <input type="range" id="sp-dhi" min="2000" max="2026" value="2026">
    </div>
    <div class="sp-rng-vals"><span id="sp-dlo-v">2000</span><span id="sp-dhi-v">2026</span></div>
  </div>
  <div class="sp-sec">
    <div class="sp-sec-lbl">멤버 생년</div>
    <div class="sp-dual">
      <input type="range" id="sp-blo" min="1985" max="2012" value="1985">
      <input type="range" id="sp-bhi" min="1985" max="2012" value="2012">
    </div>
    <div class="sp-rng-vals"><span id="sp-blo-v">1985</span><span id="sp-bhi-v">2012</span></div>
  </div>
  <div class="sp-sec">
    <div class="sp-sec-lbl">그룹 유형</div>
    <div class="sp-types">
      <button class="sp-type active" data-gender="all">전체</button>
      <button class="sp-type" data-gender="f">걸그룹</button>
      <button class="sp-type" data-gender="m">보이그룹</button>
    </div>
  </div>
  <div class="sp-row">
    <span class="sp-lbl">비활동 멤버</span>
    <button class="sp-tog on" id="sp-inactive">표시</button>
  </div>
  <div class="sp-row">
    <button class="sp-reset" id="sp-reset">↺  초기화</button>
  </div>
</div>
<div id="tabbar">
  <button class="tab-btn" id="tab-lang">KO</button>
  <div class="tab-sep"></div>
  <button class="tab-btn" id="tab-explore">✦</button>
  <button class="tab-btn" id="tab-search">🔍</button>
  <button class="tab-btn" id="tab-settings">⚙</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script>
const W=window.innerWidth,H=window.innerHeight;

// ── Scene ─────────────────────────────────────────
const scene=new THREE.Scene();
scene.background=null;

const camera=new THREE.PerspectiveCamera(60,W/H,0.1,1000);
camera.position.set(0,8,120);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,0);
document.body.appendChild(renderer.domElement);

const labelRenderer=new THREE.CSS2DRenderer();
labelRenderer.setSize(W,H);
labelRenderer.domElement.style.cssText='position:fixed;top:0;left:0;pointer-events:none;';
document.body.appendChild(labelRenderer.domElement);

const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=0.06;
controls.minDistance=5;
controls.maxDistance=300;
controls.autoRotate=true;
controls.autoRotateSpeed=0.25;

// ── Stars ─────────────────────────────────────────
function makeStarField(count,size,opacity){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(count*3);
  for(let i=0;i<count;i++){
    pos[i*3  ]=(Math.random()-.5)*400;
    pos[i*3+1]=(Math.random()-.5)*400;
    pos[i*3+2]=(Math.random()-.5)*400;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({
    color:0xffffff,size,sizeAttenuation:true,transparent:true,opacity
  }));
}
const starGroup=new THREE.Group();
starGroup.add(makeStarField(420,0.2,0.6));   // 잔별
starGroup.add(makeStarField(70,0.55,0.85));  // 중간별
starGroup.add(makeStarField(15,1.1,1.0));    // 밝은별
scene.add(starGroup);
// 기존 코드와 호환되도록 alias
const starPoints=starGroup;

// ── Lights ────────────────────────────────────────
const ambLight=new THREE.AmbientLight(0x8877aa,0.3);
scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0xc8b8a0,0.4);
dirLight.position.set(3,2,-1);
scene.add(dirLight);

// ── Glow texture ──────────────────────────────────
function makeGlowTex(){
  const c=document.createElement('canvas');c.width=128;c.height=128;
  const cx=c.getContext('2d');
  // 레이어 1: 넓은 소프트 헤일로 — 완만하게 퍼지도록
  const glow=cx.createRadialGradient(64,64,0,64,64,64);
  glow.addColorStop(0,    'rgba(255,255,255,0.65)');
  glow.addColorStop(0.15, 'rgba(255,255,255,0.38)');
  glow.addColorStop(0.35, 'rgba(255,255,255,0.15)');
  glow.addColorStop(0.55, 'rgba(255,255,255,0.05)');
  glow.addColorStop(0.78, 'rgba(255,255,255,0.01)');
  glow.addColorStop(1,    'rgba(255,255,255,0)');
  cx.fillStyle=glow;
  cx.fillRect(0,0,128,128);
  // 레이어 2: 아주 작은 코어 (반경 6px) — 별 중심처럼
  const core=cx.createRadialGradient(64,64,0,64,64,6);
  core.addColorStop(0,   'rgba(255,255,255,1.0)');
  core.addColorStop(0.55,'rgba(255,255,255,0.7)');
  core.addColorStop(1,   'rgba(255,255,255,0)');
  cx.fillStyle=core;
  cx.fillRect(0,0,128,128);
  return new THREE.CanvasTexture(c);
}
const glowTex=makeGlowTex();

// Mix rgb with grayscale 30:70
function duneColor(r,g,b){
  const gr=r*0.299+g*0.587+b*0.114;
  return new THREE.Color(
    (r*0.3+gr*0.7)/255,
    (g*0.3+gr*0.7)/255,
    (b*0.3+gr*0.7)/255
  );
}

const bubbleMats=[];
const groupLabels=[];
let ARTISTS=[],GROUPS={};
const bubbleMeshes=[],regularArtists=[],sparkleArtists=[];
let regularPts=null,sparklePts=null;
const connLines=[];
let regColorAttr=null,spkColorAttr=null;
let currentLang='ko';
const filterCfg={debutLo:2000,debutHi:2026,bdayLo:1985,bdayHi:2012,gender:'all',showInactive:true,connLines:true};
const flyState={
  active:false,

  fromCam:new THREE.Vector3(),fromOrbit:new THREE.Vector3(),
  toCam:new THREE.Vector3(),toOrbit:new THREE.Vector3(),
  onComplete:null
};
function easeInOut(t){return -(Math.cos(Math.PI*t)-1)/2;}

// ── Agency direction ──────────────────────────────
function agencyDir(co){
  const c=(co||'').toUpperCase();
  if(c.includes('SM'))  return new THREE.Vector3(1,0,0);
  if(c.includes('JYP')) return new THREE.Vector3(-1,0,0);
  if(c.includes('HYBE'))return new THREE.Vector3(0,-1,0);
  return new THREE.Vector3(0,0,1);
}

function coneSpread(co){
  const c=(co||'').toUpperCase();
  if(c.includes('SM')||c.includes('JYP'))return Math.PI*0.4;
  if(c.includes('HYBE'))return Math.PI*0.42;
  return Math.PI*0.52;
}

function randomInCone(dir,halfAngle){
  const cosA=Math.cos(halfAngle);
  const cosT=cosA+(1-cosA)*Math.random();
  const sinT=Math.sqrt(1-cosT*cosT);
  const phi=Math.random()*Math.PI*2;
  const v=new THREE.Vector3(sinT*Math.cos(phi),sinT*Math.sin(phi),cosT);
  const q=new THREE.Quaternion().setFromUnitVectors(
    new THREE.Vector3(0,0,1),dir.clone().normalize()
  );
  return v.applyQuaternion(q);
}

function debutToRadius(debutYear){
  return (2026 - debutYear) * 7.0;
}

// ── Build universe ────────────────────────────────
async function buildUniverse(){
  const [grpData,artData,connData]=await Promise.all([
    fetch('groups.json').then(r=>r.json()),
    fetch('artists.json').then(r=>r.json()),
    fetch('connections.json').then(r=>r.json())
  ]);
  document.getElementById('loading').style.display='none';
  GROUPS=grpData;ARTISTS=artData;

  const memberMap={};
  const artistByName={};
  artData.forEach(a=>{
    const k=a.group.ko;
    if(!memberMap[k])memberMap[k]=[];
    memberMap[k].push(a);
    artistByName[a.name.ko]=a;
  });

  const isMobile=window.innerWidth<=768;
  const sizeScale=isMobile?0.8:1.0;
  const opScale=isMobile?0.8:1.0;
  const regularPos=[],regularColors=[];
  const sparklePos=[],sparkleColors=[];
  let regularIdx=0,sparkleIdx=0;

  Object.entries(grpData).forEach(([ko,info])=>{
    const members=memberMap[ko]||[];
    const dist=debutToRadius(parseInt(info.debut)||2020);

    const dir=agencyDir(info.co);
    const pos=randomInCone(dir,coneSpread(info.co)).multiplyScalar(dist);

    const [r,g,b]=info.color||[180,180,200];
    const color=duneColor(r,g,b);
    const radius=Math.min(4,Math.max(2,1.8+members.length*0.25));

    // ── Bubble fill — Fresnel ShaderMaterial ──────
    const fillGeo=new THREE.SphereGeometry(radius,32,32);
    const fillMat=new THREE.ShaderMaterial({
      uniforms:{
        uColor:{value:color},
        uFresnelMult:{value:0.15},
        uBaseOp:{value:0.0},
        uFillOp:{value:0.0},
        uSunDir:{value:new THREE.Vector3(0.6,0.8,0.4).normalize()},
        uFilterOp:{value:1.0}
      },
      vertexShader:`
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main(){
          vNormal=normalize(mat3(modelMatrix)*normal);
          vec4 worldPos=modelMatrix*vec4(position,1.0);
          vViewDir=normalize(cameraPosition-worldPos.xyz);
          gl_Position=projectionMatrix*viewMatrix*worldPos;
        }`,
      fragmentShader:`
        uniform vec3 uColor;
        uniform float uFresnelMult;
        uniform float uBaseOp;
        uniform float uFillOp;
        uniform vec3 uSunDir;
        uniform float uFilterOp;
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main(){
          vec3 n=gl_FrontFacing?normalize(vNormal):-normalize(vNormal);
          vec3 v=normalize(vViewDir);
          float vd=max(0.0,dot(n,v));
          float fresnel=pow(1.0-vd,1.8);
          vec3 l=normalize(uSunDir);
          float lambert=max(0.0,dot(n,l));
          float diffuse=0.18+0.82*lambert;
          vec3 h=normalize(l+v);
          float spec=pow(max(0.0,dot(n,h)),52.0)*0.22;
          float fill=uFillOp*(diffuse+spec);
          gl_FragColor=vec4(uColor,(fresnel*uFresnelMult+uBaseOp+fill)*uFilterOp);
        }`,
      transparent:true,side:THREE.DoubleSide,depthWrite:false
    });
    bubbleMats.push(fillMat);
    const bubble=new THREE.Mesh(fillGeo,fillMat);
    bubble.position.copy(pos);
    scene.add(bubble);
    // ── Group label ───────────────────────────────
    const div=document.createElement('div');
    div.className='group-label';
    div.textContent=ko;
    div.style.color=`rgb(${Math.min(255,r*1.5|0)},${Math.min(255,g*1.5|0)},${Math.min(255,b*1.5|0)})`;
    const label=new THREE.CSS2DObject(div);
    label.position.set(0,radius+1.0,0);
    bubble.add(label);
    groupLabels.push({el:div,worldPos:pos.clone(),ko,en:info.en||ko});
    bubbleMeshes.push({mesh:bubble,ko,info,radius,labelEl:div});

    // ── Collect member positions ───────────────────
    members.forEach(m=>{
      const [mr,mg,mb]=m.color||[r,g,b];
      const mColor=duneColor(mr,mg,mb);

      const phi2=Math.acos(2*Math.random()-1);
      const theta=Math.random()*Math.PI*2;
      const rr=Math.cbrt(Math.random())*radius*0.72;
      const mPos=pos.clone().add(new THREE.Vector3(
        rr*Math.sin(phi2)*Math.cos(theta),
        rr*Math.sin(phi2)*Math.sin(theta),
        rr*Math.cos(phi2)
      ));

      const spColor=m.sparkle?mColor.clone().lerp(new THREE.Color(1,1,1),0.25):mColor;
      const pArr=m.sparkle?sparklePos:regularPos;
      const cArr=m.sparkle?sparkleColors:regularColors;
      const aArr=m.sparkle?sparkleArtists:regularArtists;
      pArr.push(mPos.x,mPos.y,mPos.z);
      cArr.push(spColor.r,spColor.g,spColor.b);
      aArr.push(m);
      m._worldPos=mPos.clone();
      m._origColor=[spColor.r,spColor.g,spColor.b];
      m._ptsType=m.sparkle?'sparkle':'regular';
      m._ptsIdx=m.sparkle?sparkleIdx++:regularIdx++;
      m._bdayYear=parseInt(m.bday)||0;
      m._filterAlpha=1; m._filterTarget=1;
    });
  });

  // ── Connection lines ──────────────────────────────
  connData.forEach(conn=>{
    const artA=artistByName[conn.a], artB=artistByName[conn.b];
    if(!artA||!artB||!artA._worldPos||!artB._worldPos)return;
    const geo=new THREE.BufferGeometry().setFromPoints([artA._worldPos,artB._worldPos]);
    let mat;
    if(conn.type==='member'){
      const grpInfo=grpData[artA.group.ko]||{};
      const[r,g,b]=grpInfo.color||[180,180,200];
      const col=duneColor(r,g,b);
      mat=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:0.15,depthWrite:false});
    }else{
      mat=new THREE.LineDashedMaterial({color:0xffffff,transparent:true,opacity:0.1,dashSize:1.2,gapSize:0.9,depthWrite:false});
    }
    const line=new THREE.Line(geo,mat);
    if(conn.type!=='member')line.computeLineDistances();
    line.visible=false;
    scene.add(line);
    const mid=artA._worldPos.clone().lerp(artB._worldPos,0.5);
    connLines.push({line,mid});
  });

  // ── Member points (fixed pixel size, camera-distance independent) ──
  function makePoints(positions,colors,sizeW,opacity){
    if(!positions.length)return;
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(positions),3));
    geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(colors),3));
    const mat=new THREE.PointsMaterial({
      size:sizeW,map:glowTex,vertexColors:true,
      transparent:true,opacity,
      depthWrite:false,blending:THREE.AdditiveBlending,
      sizeAttenuation:true
    });
    const pts=new THREE.Points(geo,mat);
    scene.add(pts);
    return pts;
  }
  regularPts=makePoints(regularPos,regularColors,5.6*sizeScale,0.55*opScale);
  sparklePts=makePoints(sparklePos,sparkleColors,12.8*sizeScale,0.9*opScale);
  if(regularPts)regColorAttr=regularPts.geometry.attributes.color;
  if(sparklePts)spkColorAttr=sparklePts.geometry.attributes.color;
}

  if(spDN){spDN.textContent=dayMode?'DAY':'NIGHT';spDN.classList.toggle('on',dayMode);}

// ── Animate ───────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  if(flyState.active){
    const raw=Math.min((performance.now()-flyState.t0)/flyState.dur,1);
    const k=easeInOut(raw);
    camera.position.lerpVectors(flyState.fromCam,flyState.toCam,k);
    controls.target.lerpVectors(flyState.fromOrbit,flyState.toOrbit,k);
    if(raw>=1){
      flyState.active=false;
      controls.enabled=true;
      if(flyState.onComplete){flyState.onComplete();flyState.onComplete=null;}
    }
  }
  controls.update();
  connLines.forEach(({line,mid})=>{
    line.visible=filterCfg.connLines&&camera.position.distanceTo(mid)<20;
  });
  let colorsDirty=false;
  bubbleMeshes.forEach(({mesh,labelEl})=>{
    const dist=camera.position.distanceTo(mesh.position);
    const t=Math.max(0,Math.min(1,(dist-15)/100));
    const f=-(Math.cos(Math.PI*t)-1)/2;
    mesh.material.uniforms.uFillOp.value=f*0.88;
    const ftgt=mesh._filterTarget??1;
    mesh._filterAlpha=mesh._filterAlpha??1;
    mesh._filterAlpha+=(ftgt-mesh._filterAlpha)*0.22;
    mesh.material.uniforms.uFilterOp.value=mesh._filterAlpha;
    if(labelEl)labelEl.style.opacity=mesh._filterAlpha;
  });
  ARTISTS.forEach(a=>{
    if(a._ptsType===undefined)return;
    const prev=a._filterAlpha;
    a._filterAlpha+=(a._filterTarget-prev)*0.22;
    if(Math.abs(a._filterAlpha-prev)<0.0005)return;
    const fa=a._filterAlpha;
    const attr=a._ptsType==='sparkle'?spkColorAttr:regColorAttr;
    if(!attr)return;
    const i=a._ptsIdx*3;
    attr.array[i]=a._origColor[0]*fa;attr.array[i+1]=a._origColor[1]*fa;attr.array[i+2]=a._origColor[2]*fa;
    colorsDirty=true;
  });
  if(colorsDirty){if(regColorAttr)regColorAttr.needsUpdate=true;if(spkColorAttr)spkColorAttr.needsUpdate=true;}
  groupLabels.forEach(({el,worldPos})=>{
    const d=camera.position.distanceTo(worldPos);
    el.style.opacity=d<40?'1':d<70?String(((70-d)/30).toFixed(2)):'0';
  });
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
animate();

// ── Search & fly-to ───────────────────────────────
function _startFly(toOrbit,toCam,dur){
  controls.autoRotate=false;
  controls.enabled=false;
  flyState.fromCam.copy(camera.position);
  flyState.fromOrbit.copy(controls.target);
  flyState.toOrbit.copy(toOrbit);
  flyState.toCam.copy(toCam);
  flyState.t0=performance.now();
  flyState.dur=dur||800;
  flyState.active=true;
}
function flyTo(pos,dur){
  if(!pos)return;
  const dir=camera.position.clone().sub(controls.target).normalize();
  if(dir.lengthSq()<0.001)dir.set(0,0,1);
  _startFly(pos,pos.clone().addScaledVector(dir,22),dur||800);
}
function flyToBubble(pos,radius){
  const dir=camera.position.clone().sub(pos).normalize();
  if(dir.lengthSq()<0.001)dir.set(0,0,1);
  // 정면 충돌 느낌 없애기: 위에서 살짝 비스듬히 + 거리 여유
  const tilted=new THREE.Vector3(dir.x*0.8,dir.y+0.28,dir.z*0.8).normalize();
  _startFly(pos,pos.clone().addScaledVector(tilted,radius*5.5),1000);
}

function _mScore(name,q,ql){
  const n=(name||'').toLowerCase();
  if(name===q||n===ql)return 0;
  if(name.startsWith(q)||n.startsWith(ql))return 1;
  return 2;
}
function doSearch(q){
  const res=document.getElementById('search-results');
  q=q.trim();
  if(!q){res.style.display='none';return;}
  const ql=q.toLowerCase();
  const hits=[];
  Object.keys(GROUPS).forEach(ko=>{
    const info=GROUPS[ko];
    const enN=info.en||'';
    if(ko.includes(q)||enN.toLowerCase().includes(ql)){
      const bm=bubbleMeshes.find(b=>b.ko===ko);
      if(bm){
        const s=Math.min(_mScore(ko,q,ql),_mScore(enN,q,ql));
        hits.push({type:'group',name:ko,pos:bm.mesh.position.clone(),data:ko,score:s+0.5});
      }
    }
  });
  ARTISTS.forEach(a=>{
    const koN=a.name.ko,enN=a.name.en||'';
    if(koN.includes(q)||enN.toLowerCase().includes(ql)){
      const s=Math.min(_mScore(koN,q,ql),_mScore(enN,q,ql));
      hits.push({type:'member',name:koN,sub:a.group.ko,pos:a._worldPos,data:a,score:s});
    }
  });
  hits.sort((a,b)=>a.score-b.score);
  res.innerHTML='';
  hits.slice(0,8).forEach(h=>{
    const div=document.createElement('div');
    div.className='sr-item';
    div.innerHTML=`<span>${h.name}</span><span class="sr-tag">${h.type==='group'?'그룹':h.sub}</span>`;
    div.addEventListener('click',e=>{
      e.stopPropagation();
      closeCards();
      flyTo(h.pos);
      document.getElementById('search-input').value=h.name;
      res.style.display='none';
      const cx=window.innerWidth/2,cy=window.innerHeight*0.38;
      if(h.type==='group'){showGC(h.data,cx,cy);pulseGroup(h.data);}
      else{showT(h.data,cx,cy);pulseMember(h.data);pulseGroup(h.data.group.ko);}
    });
    res.appendChild(div);
  });
  res.style.display=hits.length?'block':'none';
}

// ── Card helpers ──────────────────────────────────
function ytId(u){
  if(!u)return'';
  const m=u.match(/(?:youtu\.be\/|[?&]v=|\/embed\/)([A-Za-z0-9_-]{11})/);
  return m?m[1]:'';
}
function closeCards(){
  document.getElementById('tt').style.display='none';
  document.getElementById('gc').style.display='none';
}

function pulseGroup(ko){
  const bm=bubbleMeshes.find(b=>b.ko===ko);
  if(!bm)return;
  const mat=bm.mesh.material;
  const origF=mat.uniforms.uFresnelMult.value;
  const origB=mat.uniforms.uBaseOp.value;
  const t0=performance.now(),dur=2000;
  (function tick(){
    const t=Math.min((performance.now()-t0)/dur,1);
    const w=Math.sin(Math.PI*t); // 0 → peak → 0
    mat.uniforms.uFresnelMult.value=origF+w*0.28;
    mat.uniforms.uBaseOp.value=origB+w*0.10;
    if(t<1)requestAnimationFrame(tick);
    else{mat.uniforms.uFresnelMult.value=origF;mat.uniforms.uBaseOp.value=origB;}
  })();
}

function pulseMember(artist){
  if(!artist._worldPos)return;
  const [r,g,b]=artist.color||[255,255,255];
  function makeRipple(delay){
    setTimeout(()=>{
      const geo=new THREE.SphereGeometry(0.3,8,8);
      const mat=new THREE.MeshBasicMaterial({
        color:new THREE.Color(r/255,g/255,b/255),
        transparent:true,opacity:0.45,depthWrite:false,
        blending:THREE.AdditiveBlending
      });
      const s=new THREE.Mesh(geo,mat);
      s.position.copy(artist._worldPos);
      scene.add(s);
      const t0=performance.now(),dur=1700;
      (function tick(){
        const t=Math.min((performance.now()-t0)/dur,1);
        const ease=1-Math.pow(1-t,2); // easeOut quad — 초반 빠르게 퍼지고 점점 느리게
        s.scale.setScalar(1+ease*2.2);
        mat.opacity=(1-t)*0.45;
        if(t<1)requestAnimationFrame(tick);
        else scene.remove(s);
      })();
    },delay);
  }
  makeRipple(0);
  makeRipple(700); // 두 번째 파문
}

function showT(a,cx,cy){
  const el=document.getElementById('tt');
  el.style.display='block';
  document.getElementById('tn').textContent=a.name.ko;
  const tgEl=document.getElementById('tg');
  tgEl.textContent=a.group.ko;
  tgEl.onclick=e=>{e.stopPropagation();closeCards();showGC(a.group.ko,cx,cy);};
  document.getElementById('tco').textContent=a.co||'';
  const meta=[];
  if(a.nat)meta.push(typeof a.nat==='object'?a.nat.ko:a.nat);
  if(a.bday){
    const[by,bm,bd]=a.bday.split('.').map(Number);
    const now=new Date();
    let age=now.getFullYear()-by;
    if(now.getMonth()+1<bm||(now.getMonth()+1===bm&&now.getDate()<bd))age--;
    meta.push(a.bday+(age>=0?' ('+age+'세)':''));
  }
  document.getElementById('tm').textContent=meta.join(' · ');
  const tv=document.getElementById('tv');
  tv.innerHTML='';
  const songs=(a.songs||[]).slice(0,3);
  if(!songs.length){
    const p=document.createElement('div');p.className='tv-empty';p.textContent='준비 중';
    tv.appendChild(p);
  }else{
    const bigWrap=document.createElement('div');bigWrap.id='tv-big-wrap';

    bigWrap.addEventListener('click',e=>{e.stopPropagation();window.open(songs[0].u,'_blank');});
    tv.appendChild(bigWrap);
    if(songs.length>1){
      const row=document.createElement('div');row.id='tv-small-row';
      songs.slice(1).forEach(s=>{
        const box=document.createElement('div');box.className='tv-sm';
        const img=document.createElement('img');
        img.src=`https://img.youtube.com/vi/${ytId(s.u)}/mqdefault.jpg`;img.alt=s.t;
        const lbl=document.createElement('div');lbl.className='tv-sm-title';lbl.textContent=s.t;
        box.appendChild(img);box.appendChild(lbl);
        box.addEventListener('click',e=>{e.stopPropagation();window.open(s.u,'_blank');});
        row.appendChild(box);
      });
      tv.appendChild(row);
    }
  }
  const cardW=songs.length?264:210;
  el.style.maxWidth=cardW+'px';
  const estH=130+(songs.length?120+(songs.length>1?78:0):20);
  positionCard(el,cx,cy,cardW,estH);
}

function showGC(ko,cx,cy){
  const info=GROUPS[ko];if(!info)return;
  const el=document.getElementById('gc');
  el.classList.add('gc-enter');
  el.style.display='block';
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.remove('gc-enter')));
  const[r,g,b]=info.color||[180,180,200];
  document.getElementById('gc-bar').style.background=
    `linear-gradient(90deg,rgba(${r},${g},${b},0.75),rgba(${r},${g},${b},0.35))`;
  const nameEl=document.getElementById('gc-name');
  nameEl.textContent=ko;
  nameEl.style.color=dayMode?`rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`:'';
  document.getElementById('gc-en').textContent=info.en||'';
  document.getElementById('gc-co').textContent=info.co||'';
  document.getElementById('gc-debut').textContent=info.debut||'';
  const memListEl=document.getElementById('gc-mem-list');
  memListEl.innerHTML='';
  ARTISTS.filter(a=>a.group.ko===ko&&a.active).forEach((m,i)=>{
    if(i>0)memListEl.appendChild(document.createTextNode(' · '));
    const sp=document.createElement('span');sp.className='gc-mem-name';
    sp.textContent=m.name.ko;
    sp.addEventListener('click',e=>{e.stopPropagation();closeCards();showT(m,cx,cy);});
    memListEl.appendChild(sp);
  });
  const gcTv=document.getElementById('gc-tv');
  gcTv.innerHTML='';
  const songs=(info.songs||[]).slice(0,3);
  if(songs.length){
    const bigWrap=document.createElement('div');bigWrap.id='tv-big-wrap';
    const big=document.createElement('img');big.id='tv-big';
    big.src=`https://img.youtube.com/vi/${ytId(songs[0].u)}/mqdefault.jpg`;big.alt=songs[0].t;
    const bigTitle=document.createElement('div');bigTitle.id='tv-big-title';bigTitle.textContent=songs[0].t;
    bigWrap.appendChild(big);bigWrap.appendChild(bigTitle);
    bigWrap.addEventListener('click',e=>{e.stopPropagation();window.open(songs[0].u,'_blank');});
    gcTv.appendChild(bigWrap);
    if(songs.length>1){
      const row=document.createElement('div');row.id='tv-small-row';
      songs.slice(1).forEach(s=>{
        const box=document.createElement('div');box.className='tv-sm';
        const img=document.createElement('img');
        img.src=`https://img.youtube.com/vi/${ytId(s.u)}/mqdefault.jpg`;img.alt=s.t;
        const lbl=document.createElement('div');lbl.className='tv-sm-title';lbl.textContent=s.t;
        box.appendChild(img);box.appendChild(lbl);
        box.addEventListener('click',e=>{e.stopPropagation();window.open(s.u,'_blank');});
        row.appendChild(box);
      });
      gcTv.appendChild(row);
    }
  }
  const cardW=songs.length?264:234;
  el.style.maxWidth=cardW+'px';
  const nSmall=songs.length>1?songs.length-1:0;
  const estH=155+(songs.length?120+(nSmall>0?78:0):0);

  // 버블 옆에 카드 배치 (가리지 않도록)
  const bm=bubbleMeshes.find(b=>b.ko===ko);
  if(bm){
    const rect=renderer.domElement.getBoundingClientRect();
    const ctr=bm.mesh.position.clone().project(camera);
    const sx=(ctr.x+1)*0.5*rect.width+rect.left;
    const sy=(-ctr.y+1)*0.5*rect.height+rect.top;
    const edgePt=bm.mesh.position.clone().add(new THREE.Vector3(bm.radius,0,0)).project(camera);
    const ex=(edgePt.x+1)*0.5*rect.width+rect.left;
    const screenR=Math.abs(ex-sx)+18; // 스크린상 버블 반지름 + 여백
    const W=window.innerWidth,H=window.innerHeight;
    let lx;
    if(sx+screenR+cardW<W-8) lx=sx+screenR;          // 오른쪽
    else if(sx-screenR-cardW>8) lx=sx-screenR-cardW; // 왼쪽
    else lx=Math.max(8,Math.min(cx+14,W-cardW-8));    // 공간 없으면 클릭 기준
    const ly=Math.max(8,Math.min(sy-estH/2,H-estH-8));
    el.style.left=lx+'px';
    el.style.top=ly+'px';
  }else{
    positionCard(el,cx,cy,cardW,estH);
  }
}

// ── Raycaster / click ─────────────────────────────
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=6;
const _mouse=new THREE.Vector2();
let _mdx=0,_mdy=0;

// 카드 클릭이 window 이벤트로 버블링되지 않게 차단
document.getElementById('tt').addEventListener('click',e=>e.stopPropagation());
document.getElementById('gc').addEventListener('click',e=>e.stopPropagation());
document.getElementById('tabbar').addEventListener('click',e=>e.stopPropagation());
document.getElementById('settings-panel').addEventListener('click',e=>e.stopPropagation());

// ── Filter ────────────────────────────────────────
function applyFilter(){
  const{debutLo,debutHi,bdayLo,bdayHi,gender,showInactive}=filterCfg;
  // 1단계: 그룹 레벨 필터 (데뷔연도·성별)
  bubbleMeshes.forEach(({mesh,ko,info})=>{
    const yr=parseInt(info.debut)||2020;
    const ok=(gender==='all'||info.gender===gender)&&yr>=debutLo&&yr<=debutHi;
    mesh._filterTarget=ok?1:0;
  });
  // 2단계: 멤버 레벨 필터 (생년·비활동)
  ARTISTS.forEach(a=>{
    const byr=a._bdayYear||0;
    const activeOk=showInactive||(a.active!==false);
    const bdayOk=byr===0||(byr>=bdayLo&&byr<=bdayHi);
    const grpMesh=bubbleMeshes.find(b=>b.ko===a.group.ko);
    const grpOk=grpMesh?(grpMesh.mesh._filterTarget??1)>0.5:true;
    a._filterTarget=(activeOk&&bdayOk&&grpOk)?1:0;
  });
  // 3단계: 보이는 멤버가 0명인 그룹은 버블도 숨김
  bubbleMeshes.forEach(({mesh,ko})=>{
    if(mesh._filterTarget===0)return;
    const members=ARTISTS.filter(a=>a.group.ko===ko);
    if(members.length>0&&members.every(a=>a._filterTarget===0))mesh._filterTarget=0;
  });
}

// ── Tab bar ───────────────────────────────────────
function closePanels(){
  document.getElementById('search-wrap').classList.remove('open');
  document.getElementById('settings-panel').classList.remove('open');
  document.getElementById('tab-search').classList.remove('active');
  document.getElementById('tab-settings').classList.remove('active');
}
document.getElementById('tab-lang').addEventListener('click',e=>{
  e.stopPropagation();
  currentLang=currentLang==='ko'?'en':'ko';
  document.getElementById('tab-lang').textContent=currentLang.toUpperCase();
  groupLabels.forEach(({el,ko,en})=>{el.textContent=currentLang==='ko'?ko:(en||ko);});
});
document.getElementById('tab-explore').addEventListener('click',e=>{
  e.stopPropagation();
  if(!bubbleMeshes.length)return;
  const bm=bubbleMeshes[Math.floor(Math.random()*bubbleMeshes.length)];
  closePanels();closeCards();
  flyToBubble(bm.mesh.position,bm.radius);
  flyState.onComplete=()=>{
    setTimeout(()=>{
      showGC(bm.ko,window.innerWidth/2,window.innerHeight*0.38);
      pulseGroup(bm.ko);
    },150);
  };
});
document.getElementById('tab-search').addEventListener('click',e=>{
  e.stopPropagation();
  const sw=document.getElementById('search-wrap');

  const open=sw.classList.contains('open');

document.getElementById('tab-settings').addEventListener('click',e=>{
  e.stopPropagation();

  const open=sp.classList.contains('open');

  document.getElementById('tab-settings').classList.toggle('active',!open);
});

// ── Settings panel controls ───────────────────────
document.getElementById('sp-daynight').addEventListener('click',e=>{e.stopPropagation();toggleDay();});
document.getElementById('sp-conn').addEventListener('click',e=>{
  e.stopPropagation();
  filterCfg.connLines=!filterCfg.connLines;

function syncDualZ(loId,hiId,activeId){
  document.getElementById(loId).style.zIndex=activeId===loId?3:2;
  document.getElementById(hiId).style.zIndex=activeId===hiId?3:2;
}
['sp-dlo','sp-dhi'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    e.stopPropagation();
    let lo=+document.getElementById('sp-dlo').value,hi=+document.getElementById('sp-dhi').value;
    if(lo>hi){if(id==='sp-dlo')lo=hi;else hi=lo;}
    document.getElementById('sp-dlo').value=lo;document.getElementById('sp-dhi').value=hi;
    document.getElementById('sp-dlo-v').textContent=lo;document.getElementById('sp-dhi-v').textContent=hi;
    syncDualZ('sp-dlo','sp-dhi',id);
    filterCfg.debutLo=lo;filterCfg.debutHi=hi;applyFilter();
  });
});
['sp-blo','sp-bhi'].forEach(id=>{
  document.getElementById(id).addEventListener('input',e=>{
    e.stopPropagation();
    let lo=+document.getElementById('sp-blo').value,hi=+document.getElementById('sp-bhi').value;
    if(lo>hi){if(id==='sp-blo')lo=hi;else hi=lo;}
    document.getElementById('sp-blo').value=lo;document.getElementById('sp-bhi').value=hi;
    document.getElementById('sp-blo-v').textContent=lo;document.getElementById('sp-bhi-v').textContent=hi;
    syncDualZ('sp-blo','sp-bhi',id);
    filterCfg.bdayLo=lo;filterCfg.bdayHi=hi;applyFilter();
  });
});
document.querySelectorAll('.sp-type').forEach(btn=>{
  btn.addEventListener('click',e=>{
    e.stopPropagation();
    document.querySelectorAll('.sp-type').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filterCfg.gender=btn.dataset.gender;applyFilter();
  });
});
document.getElementById('sp-inactive').addEventListener('click',e=>{
  e.stopPropagation();
  filterCfg.showInactive=!filterCfg.showInactive;
  const b=document.getElementById('sp-inactive');
  b.textContent=filterCfg.showInactive?'표시':'숨김';b.classList.toggle('on',filterCfg.showInactive);
  applyFilter();
});
document.getElementById('sp-reset').addEventListener('click',e=>{
  e.stopPropagation();
  filterCfg.debutLo=2000;filterCfg.debutHi=2026;
  filterCfg.bdayLo=1985;filterCfg.bdayHi=2012;
  filterCfg.gender='all';filterCfg.showInactive=true;filterCfg.connLines=true;
  ['sp-dlo','sp-dhi','sp-blo','sp-bhi'].forEach(id=>{
    const el=document.getElementById(id);
    el.value=id==='sp-dlo'?2000:id==='sp-dhi'?2026:id==='sp-blo'?1985:2012;
  });
  document.getElementById('sp-dlo-v').textContent='2000';document.getElementById('sp-dhi-v').textContent='2026';
  document.getElementById('sp-blo-v').textContent='1985';document.getElementById('sp-bhi-v').textContent='2012';
  syncDualZ('sp-dlo','sp-dhi','sp-dhi');syncDualZ('sp-blo','sp-bhi','sp-bhi');
  document.querySelectorAll('.sp-type').forEach((b,i)=>b.classList.toggle('active',i===0));
  const ib=document.getElementById('sp-inactive');ib.textContent='표시';ib.classList.add('on');
  const cb=document.getElementById('sp-conn');cb.textContent='ON';cb.classList.add('on');
  applyFilter();
});

['settings-panel','search-wrap','tabbar'].forEach(id=>{
  document.getElementById(id).addEventListener('pointerdown',e=>e.stopPropagation());
});
window.addEventListener('pointerdown',e=>{_mdx=e.clientX;_mdy=e.clientY;closePanels();});
window.addEventListener('click',e=>{
  if(Math.hypot(e.clientX-_mdx,e.clientY-_mdy)>5)return;
  const rect=renderer.domElement.getBoundingClientRect();
  if(e.clientX<rect.left||e.clientX>rect.right||e.clientY<rect.top||e.clientY>rect.bottom)return;
  _mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
  _mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(_mouse,camera);

  function nearestMember(){
    let nearArtist=null,nearPx=Infinity;
    ARTISTS.forEach(a=>{
      if(!a._worldPos)return;
      const p=a._worldPos.clone().project(camera);
      if(p.z>1)return;
      const sx=(p.x+1)*0.5*rect.width+rect.left;
      const sy=(-p.y+1)*0.5*rect.height+rect.top;
      const d=Math.hypot(sx-e.clientX,sy-e.clientY);
      if(d<nearPx){nearPx=d;nearArtist=a;}
    });
    return nearPx<20?nearArtist:null;
  }

  const bHits=raycaster.intersectObjects(bubbleMeshes.map(b=>b.mesh));
  if(bHits.length){
    const found=bubbleMeshes.find(b=>b.mesh===bHits[0].object);
    if(found){
      const planetMode=found.mesh.material.uniforms.uFillOp.value>0.12;
      if(!planetMode){
        // 투명 버블 → 멤버 우선
        const a=nearestMember();
        if(a){closeCards();showT(a,e.clientX,e.clientY);return;}
      }
      // 행성 모드 or 멤버 없음 → 그룹 카드
      closeCards();
      flyToBubble(found.mesh.position,found.radius);
      showGC(found.ko,e.clientX,e.clientY);
      return;
    }
  }

  // 버블 밖 → 멤버만 체크
  const a=nearestMember();
  if(a){closeCards();showT(a,e.clientX,e.clientY);return;}
  closeCards();
});

buildUniverse().catch(err=>{
  document.getElementById('loading').textContent='Error: '+err.message;
  console.error(err);
});
